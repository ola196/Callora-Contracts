hain =\n                token::Client::new(\u0026env, \u0026usdc_token).balance(\u0026env.current_contract_address());\n            if on_chain \u003c balance {\n                return Err(VaultError::InitialBalanceExceedsOnLedger);\n            }\n        }\n        let meta = VaultMeta {\n            owner: owner.clone(),\n            balance,\n            authorized_caller,\n            min_deposit: min_d,\n        };\n        inst.set(\u0026StorageKey::MetaKey, \u0026meta);\n        inst.set(\u0026StorageKey::UsdcToken, \u0026usdc_token);\n        inst.set(\u0026StorageKey::Admin, \u0026owner);\n        if let Some(p) = revenue_pool {\n            inst.set(\u0026StorageKey::RevenuePool, \u0026p);\n        }\n        inst.set(\u0026StorageKey::MaxDeduct, \u0026max_d);\n        inst.extend_ttl(INSTANCE_BUMP_THRESHOLD, INSTANCE_BUMP_AMOUNT);\n        env.events()\n            .publish((Symbol::new(\u0026env, \"init\"), owner.clone()), balance);\n        Ok(meta)\n    }\n\n    // -----------------------------------------------------------------------\n    // View functions — no TTL bump (read-only, zero write cost)\n    // -----------------------------------------------------------------------\n\n    /// Return full vault state. Returns error if vault is not initialized.\n    pub fn get_meta(env: Env) -\u003e Result\u003cVaultMeta, VaultError\u003e {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::MetaKey)\n            .ok_or(VaultError::NotInitialized)\n    }\n\n    /// Return the current tracked USDC balance. Returns error if vault is not initialized.\n    pub fn balance(env: Env) -\u003e Result\u003ci128, VaultError\u003e {\n        Ok(Self::get_meta(env)?.balance)\n    }\n\n    /// Return the current admin address. Returns error if vault is not initialized.\n    pub fn get_admin(env: Env) -\u003e Result\u003cAddress, VaultError\u003e {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::Admin)\n            .ok_or(VaultError::NotInitialized)\n    }\n\n    /// Return the USDC token contract address. Returns error if vault is not initialized.\n    pub fn get_usdc_token(env: Env) -\u003e Result\u003cAddress, VaultError\u003e {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::UsdcToken)\n            .ok_or(VaultError::NotInitialized)\n    }\n\n    /// Return the configured max deduct value. Returns `i128::MAX` if not explicitly set.\n    pub fn get_max_deduct(env: Env) -\u003e i128 {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::MaxDeduct)\n            .unwrap_or(DEFAULT_MAX_DEDUCT)\n    }\n\n    /// Return the configured settlement address.\n    /// Returns error if `set_settlement` has not been called.\n    pub fn get_settlement(env: Env) -\u003e Result\u003cAddress, VaultError\u003e {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::Settlement)\n            .ok_or(VaultError::SettlementNotSet)\n    }\n\n    /// Return the configured revenue pool address, or `None` if not set.\n    pub fn get_revenue_pool(env: Env) -\u003e Option\u003cAddress\u003e {\n        env.storage().instance().get(\u0026StorageKey::RevenuePool)\n    }\n\n    /// Return the pending owner address, or `None` if no ownership transfer is in progress.\n    pub fn get_pending_owner(env: Env) -\u003e Option\u003cAddress\u003e {\n        env.storage().instance().get(\u0026StorageKey::PendingOwner)\n    }\n\n    /// Return the pending admin address, or `None` if no admin transfer is in progress.\n    pub fn get_pending_admin(env: Env) -\u003e Option\u003cAddress\u003e {\n        env.storage().instance().get(\u0026StorageKey::PendingAdmin)\n    }\n\n    /// Return `(usdc_token, settlement, revenue_pool)` in one call.\n    /// Useful for operators verifying deployment configuration.\n    pub fn get_contract_addresses(env: Env) -\u003e (Option\u003cAddress\u003e, Option\u003cAddress\u003e, Option\u003cAddress\u003e) {\n        let inst = env.storage().instance();\n        (\n            inst.get(\u0026StorageKey::UsdcToken),\n            inst.get(\u0026StorageKey::Settlement),\n            inst.get(\u0026StorageKey::RevenuePool),\n        )\n    }\n\n    /// Return `true` if the vault is currently paused, `false` otherwise.\n    /// Returns `false` before the first `pause()` call (safe default).\n    pub fn is_paused(env: Env) -\u003e bool {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::Paused)\n            .unwrap_or(false)\n    }\n\n    /// Return `true` if `caller` is the owner or an allowed depositor.\n    /// Returns error if vault is not initialized.\n    pub fn is_authorized_depositor(env: Env, caller: Address) -\u003e Result\u003cbool, VaultError\u003e {\n        let meta = Self::get_meta(env.clone())?;\n        if caller == meta.owner {\n            return Ok(true);\n        }\n        let list: Vec\u003cAddress\u003e = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::DepositorList)\n            .unwrap_or(Vec::new(\u0026env));\n        Ok(list.contains(\u0026caller))\n    }\n\n    /// Return stored offering metadata, or `None` if not set.\n    pub fn get_metadata(env: Env, offering_id: String) -\u003e Option\u003cString\u003e {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::Metadata(offering_id))\n    }\n\n    /// Return the full allowed-depositor list.\n    pub fn get_allowed_depositors(env: Env) -\u003e Vec\u003cAddress\u003e {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::DepositorList)\n            .unwrap_or(Vec::new(\u0026env))\n    }\n\n    // -----------------------------------------------------------------------\n    // Mutating functions\n    // -----------------------------------------------------------------------\n\n    pub fn set_admin(env: Env, caller: Address, new_admin: Address) -\u003e Result\u003c(), VaultError\u003e {\n        caller.require_auth();\n        let cur = Self::get_admin(env.clone())?;\n        if caller != cur {\n            return Err(VaultError::Unauthorized);\n        }\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::PendingAdmin, \u0026new_admin);\n        env.events()\n            .publish((Symbol::new(\u0026env, \"admin_nominated\"), cur, new_admin), ());\n        Ok(())\n    }\n\n    pub fn accept_admin(env: Env) -\u003e Result\u003c(), VaultError\u003e {\n        let pending: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::PendingAdmin)\n            .ok_or(VaultError::NoAdminTransferPending)?;\n        pending.require_auth();\n        let cur = Self::get_admin(env.clone())?;\n        env.storage().instance().set(\u0026StorageKey::Admin, \u0026pending);\n        env.storage().instance().remove(\u0026StorageKey::PendingAdmin);\n        env.events()\n            .publish((Symbol::new(\u0026env, \"admin_accepted\"), cur, pending), ());\n        Ok(())\n    }\n\n    pub fn require_owner(env: Env, caller: Address) -\u003e Result\u003c(), VaultError\u003e {\n        let meta = Self::get_meta(env.clone())?;\n        if caller != meta.owner {\n            return Err(VaultError::Unauthorized);\n        }\n        Ok(())\n    }\n\n    /// Set or clear the authorized caller for `deduct`/`batch_deduct` (owner only).\n    pub fn set_authorized_caller(env: Env, new_caller: Option\u003cAddress\u003e) -\u003e Result\u003c(), VaultError\u003e {\n        let mut meta = Self::get_meta(env.clone())?;\n        meta.owner.require_auth();\n        if let Some(ref caller) = new_caller {\n            if caller == \u0026env.current_contract_address() {\n                return Err(VaultError::AuthorizedCallerCannotBeVault);\n            }\n        }\n        let old = meta.authorized_caller.clone();\n        meta.authorized_caller = new_caller.clone();\n        env.storage().instance().set(\u0026StorageKey::MetaKey, \u0026meta);\n        env.events().publish(\n            (\n                Symbol::new(\u0026env, \"set_authorized_caller\"),\n                meta.owner.clone(),\n            ),\n            (old, new_caller),\n        );\n        Ok(())\n    }\n\n    /// Set `max_deduct` (owner only).\n    ///\n    /// # Errors\n    /// - `VaultError::MaxDeductNotPositive` when `max_deduct \u003c= 0`.\n    pub fn set_max_deduct(env: Env, max_deduct: i128) -\u003e Result\u003c(), VaultError\u003e {\n        let meta = Self::get_meta(env.clone())?;\n        meta.owner.require_auth();\n        if max_deduct \u003c= 0 {\n            return Err(VaultError::MaxDeductNotPositive);\n        }\n        let old = Self::get_max_deduct(env.clone());\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::MaxDeduct, \u0026max_deduct);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"set_max_deduct\"), meta.owner),\n            (old, max_deduct),\n        );\n        Ok(())\n    }\n\n    pub fn set_allowed_depositor(\n        env: Env,\n        caller: Address,\n        depositor: Option\u003cAddress\u003e,\n    ) -\u003e Result\u003c(), VaultError\u003e {\n        caller.require_auth();\n        Self::require_owner(env.clone(), caller.clone())?;\n        match depositor {\n            Some(d) =\u003e {\n                let mut list: Vec\u003cAddress\u003e = env\n                    .storage()\n                    .instance()\n                    .get(\u0026StorageKey::DepositorList)\n                    .unwrap_or(Vec::new(\u0026env));\n                if !list.contains(\u0026d) {\n                    list.push_back(d);\n                }\n                env.storage()\n                    .instance()\n                    .set(\u0026StorageKey::DepositorList, \u0026list);\n            }\n            None =\u003e {\n                env.storage()\n                    .instance()\n                    .set(\u0026StorageKey::DepositorList, \u0026Vec::\u003cAddress\u003e::new(\u0026env));\n            }\n        }\n        Ok(())\n    }\n\n    pub fn clear_allowed_depositors(env: Env, caller: Address) -\u003e Result\u003c(), VaultError\u003e {\n        caller.require_auth();\n        Self::require_owner(env.clone(), caller)?;\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::DepositorList, \u0026Vec::\u003cAddress\u003e::new(\u0026env));\n        Ok(())\n    }\n\n    pub fn pause(env: Env, caller: Address) -\u003e Result\u003c(), VaultError\u003e {\n        caller.require_auth();\n        Self::require_admin_or_owner(env.clone(), \u0026caller)?;\n        if Self::is_paused(env.clone()) {\n            return Err(VaultError::AlreadyPaused);\n        }\n        env.storage().instance().set(\u0026StorageKey::Paused, \u0026true);\n        env.events()\n            .publish((Symbol::new(\u0026env, \"vault_paused\"), caller), ());\n        Ok(())\n    }\n\n    pub fn unpause(env: Env, caller: Address) -\u003e Result\u003c(), VaultError\u003e {\n        caller.require_auth();\n        Self::require_admin_or_owner(env.clone(), \u0026caller)?;\n        if !Self::is_paused(env.clone()) {\n            return Err(VaultError::NotPaused);\n        }\n        env.storage().instance().set(\u0026StorageKey::Paused, \u0026false);\n        env.events()\n            .publish((Symbol::new(\u0026env, \"vault_unpaused\"), caller), ());\n        Ok(())\n    }\n\n    /// Deposit USDC into the vault.\n    ///\n    /// Follows the **Checks-Effects-Interactions** pattern:\n    /// 1. **Checks** — pause guard, auth, amount validation, depositor allowlist, minimum.\n    /// 2. **Effects** — compute new balance, persist updated `MetaKey` to storage.\n    /// 3. **Interaction** — transfer USDC from caller to vault.\n    ///\n    /// # CEI Rationale\n    /// State is updated **before** the external token call so that a malicious or\n    /// reentrant token contract cannot observe stale internal accounting. If the\n    /// transfer panics, Soroban atomically reverts the entire transaction —\n    /// including the already-persisted state write — leaving no inconsistent\n    /// on-ledger state.\n    pub fn deposit(env: Env, caller: Address, amount: i128) -\u003e Result\u003ci128, VaultError\u003e {\n        // ── Checks ────────────────────────────────────────────────────────\n        Self::require_not_paused(env.clone())?;\n        caller.require_auth();\n        if amount \u003c= 0 {\n            return Err(VaultError::AmountNotPositive);\n        }\n        if !Self::is_authorized_depositor(env.clone(), caller.clone())? {\n            return Err(VaultError::Unauthorized);\n        }\n        let mut meta = Self::get_meta(env.clone())?;\n        if amount \u003c meta.min_deposit {\n            return Err(VaultError::BelowMinDeposit);\n        }\n        let usdc_addr: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::UsdcToken)\n            .ok_or(VaultError::NotInitialized)?;\n\n        // ── Effects ───────────────────────────────────────────────────────\n        meta.balance = meta\n            .balance\n            .checked_add(amount)\n            .ok_or(VaultError::Overflow)?;\n        env.storage().instance().set(\u0026StorageKey::MetaKey, \u0026meta);\n        env.storage()\n            .instance()\n            .extend_ttl(INSTANCE_BUMP_THRESHOLD, INSTANCE_BUMP_AMOUNT);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"deposit\"), caller.clone()),\n            (amount, meta.balance),\n        );\n\n        // ── Interaction ───────────────────────────────────────────────────\n        // Transfer USDC from caller to vault. If this panics, the Soroban host\n        // reverts the entire transaction — the Effects above are atomically rolled\n        // back, leaving no inconsistent state.\n        token::Client::new(\u0026env, \u0026usdc_addr).transfer(\n            \u0026caller,\n            \u0026env.current_contract_address(),\n            \u0026amount,\n        );\n\n        Ok(meta.balance)\n    }\n\n    /// Deduct USDC from the vault and transfer it to the configured settlement address,\n    /// then notify the settlement contract to credit the global pool.\n    ///\n    /// # Preconditions\n    /// - `set_settlement` must have been called; returns error otherwise.\n    /// - `amount` must be positive and \u003c= `max_deduct`.\n    /// - `caller` must be the owner or `authorized_caller`.\n    /// - Vault balance must cover `amount`.\n    ///\n    /// # Idempotency\n    /// When `request_id` is `Some(id)`, the contract checks whether `id` has\n    /// already been processed.  If so, `VaultError::DuplicateRequestId` is\n    /// returned immediately — no funds are moved.  On first success the marker\n    /// is persisted in temporary storage for `REQUEST_ID_BUMP_AMOUNT` ledgers.\n    ///\n    /// When `request_id` is `None`, no deduplication is performed.\n    ///\n    /// # `to_pool` Semantics (Vault-Originated Deducts)\n    /// For deducts initiated via this vault contract, the deducted amount is always\n    /// credited to the **global pool** in the settlement contract. This is done\n    /// by calling `settlement_client.receive_payment(..., to_pool=true, developer=None)`.\n    pub fn deduct(\n        env: Env,\n        caller: Address,\n        amount: i128,\n        request_id: Option\u003cSymbol\u003e,\n    ) -\u003e Result\u003ci128, VaultError\u003e {\n        Self::require_not_paused(env.clone())?;\n        caller.require_auth();\n        if amount \u003c= 0 {\n            return Err(VaultError::AmountNotPositive);\n        }\n        Self::require_authorized_deduct_caller(env.clone(), \u0026caller)?;\n        let max_d = Self::get_max_deduct(env.clone());\n        if amount \u003e max_d {\n            return Err(VaultError::ExceedsMaxDeduct);\n        }\n        // Idempotency check — must happen before any state mutation.\n        if let Some(ref rid) = request_id {\n            Self::require_not_duplicate(\u0026env, rid)?;\n        }\n        let meta = Self::get_meta(env.clone())?;\n        if meta.balance \u003c amount {\n            return Err(VaultError::InsufficientBalance);\n        }\n        let settlement = Self::require_settlement(\u0026env)?;\n        let ut: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::UsdcToken)\n            .ok_or(VaultError::NotInitialized)?;\n\n        // SECURITY: Perform all external operations FIRST.\n        // Although this is a CEI violation (Check-Effect-Interaction), re-entry is\n        // blocked by Soroban's authorization model. Each call to `deduct` requires\n        // `caller.require_auth()`, which prevents recursive calls from stealing\n        // authorization unless the user explicitly signs a nested call.\n        Self::transfer_funds(\u0026env, \u0026ut, \u0026settlement, amount);\n\n        // Create a settlement client and call receive_payment to credit the global pool\n        let settlement_client = SettlementClient::new(\u0026env, \u0026settlement);\n        settlement_client.receive_payment(\n            \u0026env.current_contract_address(),\n            \u0026amount,\n            \u0026true, // to_pool = true: credit global pool\n            \u0026None, // no specific developer\n        );\n\n        // Now that external operations succeeded, update internal state\n        let mut meta = Self::get_meta(env.clone())?;\n        meta.balance = meta\n            .balance\n            .checked_sub(amount)\n            .ok_or(VaultError::Overflow)?;\n        env.storage().instance().set(\u0026StorageKey::MetaKey, \u0026meta);\n        env.storage()\n            .instance()\n            .extend_ttl(INSTANCE_BUMP_THRESHOLD, INSTANCE_BUMP_AMOUNT);\n        // Mark request_id as processed after successful state update.\n        if let Some(ref rid) = request_id {\n            Self::mark_request_processed(\u0026env, rid);\n        }\n\n        let rid = request_id.unwrap_or(Symbol::new(\u0026env, \"\"));\n        env.events().publish(\n            (Symbol::new(\u0026env, \"deduct\"), caller, rid),\n            (amount, meta.balance),\n        );\n        Ok(meta.balance)\n    }\n\n    /// Deduct multiple items atomically.\n    ///\n    /// Full-batch validation completes before any state write or transfer.\n    /// If any item fails validation, the entire batch reverts with no partial effects.\n    ///\n    /// # Idempotency\n    /// For each item where `request_id` is `Some(id)`, the contract checks for\n    /// duplicates before processing the batch.  If any `id` in the batch has\n    /// already been processed, `VaultError::DuplicateRequestId` is returned and\n    /// the entire batch is rejected atomically.  On success, all `Some` ids in\n    /// the batch are marked as processed.\n    ///\n    /// Items with `request_id = None` are not deduplicated.\n    ///\n    /// # `to_pool` Semantics (Vault-Originated Batch Deducts)\n    /// For batch deducts initiated via this vault contract, the total deducted amount\n    /// is always credited to the **global pool** in the settlement contract.\n    /// This is done by calling `settlement_client.receive_payment(..., to_pool=true, developer=None)`.\n    pub fn batch_deduct(\n        env: Env,\n        caller: Address,\n        items: Vec\u003cDeductItem\u003e,\n    ) -\u003e Result\u003ci128, VaultError\u003e {\n        Self::require_not_paused(env.clone())?;\n        caller.require_auth();\n        Self::require_authorized_deduct_caller(env.clone(), \u0026caller)?;\n        let n = items.len();\n        if n == 0 {\n            return Err(VaultError::BatchEmpty);\n        }\n        if n \u003e MAX_BATCH_SIZE {\n            return Err(VaultError::BatchTooLarge);\n        }\n        let max_d = Self::get_max_deduct(env.clone());\n        let meta = Self::get_meta(env.clone())?;\n        let mut running = meta.balance;\n        let mut total: i128 = 0;\n        // Collect ids seen within this batch to catch intra-batch duplicates.\n        let mut seen_in_batch: Vec\u003cSymbol\u003e = Vec::new(\u0026env);\n        // Full validation pass — no state writes yet.\n        for item in items.iter() {\n            if item.amount \u003c= 0 {\n                return Err(VaultError::AmountNotPositive);\n            }\n            if item.amount \u003e max_d {\n                return Err(VaultError::ExceedsMaxDeduct);\n            }\n            if running \u003c item.amount {\n                return Err(VaultError::InsufficientBalance);\n            }\n            // Idempotency check per item — before any state mutation.\n            // Also catches intra-batch duplicates (two items with the same new id).\n            if let Some(ref rid) = item.request_id {\n                Self::require_not_duplicate(\u0026env, rid)?;\n                if seen_in_batch.contains(rid) {\n                    return Err(VaultError::DuplicateRequestId);\n                }\n                seen_in_batch.push_back(rid.clone());\n            }\n            running = running\n                .checked_sub(item.amount)\n                .ok_or(VaultError::Overflow)?;\n            total = total.checked_add(item.amount).ok_or(VaultError::Overflow)?;\n        }\n        let settlement = Self::require_settlement(\u0026env)?;\n        let ut: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::UsdcToken)\n            .ok_or(VaultError::NotInitialized)?;\n\n        // SECURITY: External operations performed before internal state update.\n        // Protected by `require_auth` and Soroban invocation semantics.\n        Self::transfer_funds(\u0026env, \u0026ut, \u0026settlement, total);\n\n        // Create a settlement client and call receive_payment to credit the global pool\n        let settlement_client = SettlementClient::new(\u0026env, \u0026settlement);\n        settlement_client.receive_payment(\n            \u0026env.current_contract_address(),\n            \u0026total,\n            \u0026true, // to_pool = true: credit global pool\n            \u0026None, // no specific developer\n        );\n\n        // Now that external operations succeeded, update internal state\n        let mut meta = Self::get_meta(env.clone())?;\n        meta.balance = running;\n        env.storage().instance().set(\u0026StorageKey::MetaKey, \u0026meta);\n        env.storage()\n            .instance()\n            .extend_ttl(INSTANCE_BUMP_THRESHOLD, INSTANCE_BUMP_AMOUNT);\n        // Mark all request_ids as processed after successful state update.\n        for item in items.iter() {\n            if let Some(ref rid) = item.request_id {\n                Self::mark_request_processed(\u0026env, rid);\n            }\n        }\n\n        for item in items.iter() {\n            let rid = item.request_id.unwrap_or(Symbol::new(\u0026env, \"\"));\n            env.events().publish(\n                (Symbol::new(\u0026env, \"deduct\"), caller.clone(), rid),\n                (item.amount, meta.balance),\n            );\n        }\n        Ok(meta.balance)\n    }\n\n    pub fn transfer_ownership(env: Env, new_owner: Address) -\u003e Result\u003c(), VaultError\u003e {\n        let meta = Self::get_meta(env.clone())?;\n        meta.owner.require_auth();\n        if new_owner == meta.owner {\n            return Err(VaultError::NewOwnerSameAsCurrent);\n        }\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::PendingOwner, \u0026new_owner);\n        env.events().publish(\n            (\n                Symbol::new(\u0026env, \"ownership_nominated\"),\n                meta.owner,\n                new_owner,\n            ),\n            (),\n        );\n        Ok(())\n    }\n\n    pub fn accept_ownership(env: Env) -\u003e Result\u003c(), VaultError\u003e {\n        let pending: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::PendingOwner)\n            .ok_or(VaultError::NoOwnershipTransferPending)?;\n        pending.require_auth();\n        let mut meta = Self::get_meta(env.clone())?;\n        let old = meta.owner.clone();\n        meta.owner = pending;\n        env.storage().instance().set(\u0026StorageKey::MetaKey, \u0026meta);\n        env.storage().instance().remove(\u0026StorageKey::PendingOwner);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"ownership_accepted\"), old, meta.owner),\n            (),\n        );\n        Ok(())\n    }\n\n    pub fn withdraw(env: Env, amount: i128) -\u003e Result\u003ci128, VaultError\u003e {\n        let mut meta = Self::get_meta(env.clone())?;\n        meta.owner.require_auth();\n        if amount \u003c= 0 {\n            return Err(VaultError::AmountNotPositive);\n        }\n        if meta.balance \u003c amount {\n            return Err(VaultError::InsufficientBalance);\n        }\n        let ua: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::UsdcToken)\n            .ok_or(VaultError::NotInitialized)?;\n        // SECURITY: External transfer before state update. Protected by owner auth.\n        token::Client::new(\u0026env, \u0026ua).transfer(\n            \u0026env.current_contract_address(),\n            \u0026meta.owner,\n            \u0026amount,\n        );\n        meta.balance = meta\n            .balance\n            .checked_sub(amount)\n            .ok_or(VaultError::Overflow)?;\n        env.storage().instance().set(\u0026StorageKey::MetaKey, \u0026meta);\n        env.storage()\n            .instance()\n            .extend_ttl(INSTANCE_BUMP_THRESHOLD, INSTANCE_BUMP_AMOUNT);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"withdraw\"), meta.owner.clone()),\n            (amount, meta.balance),\n        );\n        Ok(meta.balance)\n    }\n\n    /// Withdraw USDC from the vault to a specific recipient.\n    ///\n    /// Requires owner authorization and rejects recipients that would strand\n    /// tracked funds: the vault contract itself and the configured USDC token\n    /// contract. Settlement and revenue-pool addresses are valid recipients.\n    ///\n    /// # Errors\n    /// - `VaultError::AmountNotPositive` — `amount \u003c= 0`.\n    /// - `VaultError::InsufficientBalance` — tracked vault balance is too low.\n    /// - `VaultError::NotInitialized` — USDC token address is missing.\n    /// - `VaultError::WithdrawToVaultAddress` — recipient is this vault.\n    /// - `VaultError::WithdrawToUsdcTokenAddress` — recipient is the USDC token.\n    /// - `VaultError::Overflow` — checked balance subtraction failed.\n    pub fn withdraw_to(env: Env, to: Address, amount: i128) -\u003e Result\u003ci128, VaultError\u003e {\n        let mut meta = Self::get_meta(env.clone())?;\n        meta.owner.require_auth();\n        if amount \u003c= 0 {\n            return Err(VaultError::AmountNotPositive);\n        }\n        if meta.balance \u003c amount {\n            return Err(VaultError::InsufficientBalance);\n        }\n        let ua: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::UsdcToken)\n            .ok_or(VaultError::NotInitialized)?;\n        if to == env.current_contract_address() {\n            return Err(VaultError::WithdrawToVaultAddress);\n        }\n        if to == ua {\n            return Err(VaultError::WithdrawToUsdcTokenAddress);\n        }\n        token::Client::new(\u0026env, \u0026ua).transfer(\u0026env.current_contract_address(), \u0026to, \u0026amount);\n        meta.balance = meta\n            .balance\n            .checked_sub(amount)\n            .ok_or(VaultError::Overflow)?;\n        env.storage().instance().set(\u0026StorageKey::MetaKey, \u0026meta);\n        env.storage()\n            .instance()\n            .extend_ttl(INSTANCE_BUMP_THRESHOLD, INSTANCE_BUMP_AMOUNT);\n        env.events().publish(\n            (\n                Symbol::new(\u0026env, \"withdraw_to\"),\n                meta.owner.clone(),\n                to.clone(),\n            ),\n            (amount, meta.balance),\n        );\n        Ok(meta.balance)\n    }\n\n    /// Distribute USDC from the vault to an arbitrary recipient (admin only).\n    ///\n    /// This function moves **untracked on-ledger surplus** — it checks the actual\n    /// token balance, NOT `meta.balance`. Use this to recover funds that exist\n    /// on-ledger but are not reflected in the vault's internal accounting.\n    ///\n    /// ## Pause Policy\n    /// This function is **ALLOWED when paused**, matching the `withdraw` policy.\n    /// Rationale: `distribute` is an emergency recovery tool for admins to move\n    /// untracked surplus funds even during a circuit-breaker event.\n    ///\n    /// # Errors\n    /// - `VaultError::Unauthorized` — caller is not the admin.\n    /// - `VaultError::AmountNotPositive` — `amount \u003c= 0`.\n    /// - `VaultError::InsufficientBalance` — vault lacks on-ledger USDC for transfer.\n    pub fn distribute(\n        env: Env,\n        caller: Address,\n        to: Address,\n        amount: i128,\n    ) -\u003e Result\u003c(), VaultError\u003e {\n        caller.require_auth();\n        let admin = Self::get_admin(env.clone())?;\n        if caller != admin {\n            return Err(VaultError::Unauthorized);\n        }\n        if amount \u003c= 0 {\n            return Err(VaultError::AmountNotPositive);\n        }\n        let usdc_addr: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::UsdcToken)\n            .ok_or(VaultError::NotInitialized)?;\n        let usdc = token::Client::new(\u0026env, \u0026usdc_addr);\n        if usdc.balance(\u0026env.current_contract_address()) \u003c amount {\n            return Err(VaultError::InsufficientBalance);\n        }\n        // CEI: emit event before external transfer\n        env.events()\n            .publish((Symbol::new(\u0026env, \"distribute\"), to.clone()), amount);\n        usdc.transfer(\u0026env.current_contract_address(), \u0026to, \u0026amount);\n        Ok(())\n    }\n\n    pub fn set_revenue_pool(\n        env: Env,\n        caller: Address,\n        revenue_pool: Option\u003cAddress\u003e,\n    ) -\u003e Result\u003c(), VaultError\u003e {\n        caller.require_auth();\n        let admin = Self::get_admin(env.clone())?;\n        if caller != admin {\n            return Err(VaultError::Unauthorized);\n        }\n        match revenue_pool {\n            Some(addr) =\u003e {\n                if addr == env.current_contract_address() {\n                    return Err(VaultError::RevenuePoolCannotBeVault);\n                }\n                env.storage()\n                    .instance()\n                    .set(\u0026StorageKey::RevenuePool, \u0026addr);\n                env.events()\n                    .publish((Symbol::new(\u0026env, \"set_revenue_pool\"), caller), addr);\n            }\n            None =\u003e {\n                env.storage().instance().remove(\u0026StorageKey::RevenuePool);\n                env.events()\n                    .publish((Symbol::new(\u0026env, \"clear_revenue_pool\"), caller), ());\n            }\n        }\n        Ok(())\n    }\n\n    /// Store the settlement contract address (admin only).\n    ///\n    /// `deduct` and `batch_deduct` return error until this is called.\n    pub fn set_settlement(\n        env: Env,\n        caller: Address,\n        settlement_address: Address,\n    ) -\u003e Result\u003c(), VaultError\u003e {\n        caller.require_auth();\n        let admin = Self::get_admin(env.clone())?;\n        if caller != admin {\n            return Err(VaultError::Unauthorized);\n        }\n        if settlement_address == env.current_contract_address() {\n            return Err(VaultError::SettlementCannotBeVault);\n        }\n        let usdc_addr: Address = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::UsdcToken)\n            .ok_or(VaultError::NotInitialized)?;\n        if settlement_address == usdc_addr {\n            return Err(VaultError::SettlementCannotBeUsdcToken);\n        }\n        if let Some(revenue_pool) = env\n            .storage()\n            .instance()\n            .get::\u003c_, Address\u003e(\u0026StorageKey::RevenuePool)\n        {\n            if settlement_address == revenue_pool {\n                return Err(VaultError::SettlementCannotEqualRevenuePool);\n            }\n        }\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::Settlement, \u0026settlement_address);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"set_settlement\"), caller),\n            settlement_address,\n        );\n        Ok(())\n    }\n\n    pub fn set_metadata(\n        env: Env,\n        caller: Address,\n        offering_id: String,\n        metadata: String,\n    ) -\u003e Result\u003cString, VaultError\u003e {\n        caller.require_auth();\n        Self::require_owner(env.clone(), caller.clone())?;\n        if offering_id.len() \u003e MAX_OFFERING_ID_LEN {\n            return Err(VaultError::OfferingIdTooLong);\n        }\n        if metadata.len() \u003e MAX_METADATA_LEN {\n            return Err(VaultError::MetadataTooLong);\n        }\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::Metadata(offering_id.clone()), \u0026metadata);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"metadata_set\"), offering_id, caller),\n            metadata.clone(),\n        );\n        Ok(metadata)\n    }\n\n    /// Set price for an offering (owner only).\n    ///\n    /// # Errors\n    /// - `VaultError::OfferingIdTooLong` when `offering_id` exceeds maximum length.\n    /// - `VaultError::PriceParseError` when `price` cannot be parsed to a positive i128.\n    pub fn set_price(\n        env: Env,\n        caller: Address,\n        offering_id: String,\n        price: String,\n    ) -\u003e Result\u003c(), VaultError\u003e {\n        caller.require_auth();\n        Self::require_owner(env.clone(), caller.clone())?;\n        if offering_id.len() \u003e MAX_OFFERING_ID_LEN {\n            return Err(VaultError::OfferingIdTooLong);\n        }\n        let price_len = price.len() as usize;\n        if price_len == 0 || price_len \u003e 64 {\n            return Err(VaultError::PriceParseError);\n        }\n        let mut price_buf = [0u8; 64];\n        price.copy_into_slice(\u0026mut price_buf[..price_len]);\n        let price_str = core::str::from_utf8(\u0026price_buf[..price_len])\n            .map_err(|_| VaultError::PriceParseError)?;\n        let price_i128: i128 = price_str.parse().map_err(|_| VaultError::PriceParseError)?;\n        if price_i128 \u003c= 0 {\n            return Err(VaultError::PriceParseError);\n        }\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::Price(offering_id.clone()), \u0026price);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"price_set\"), caller, offering_id),\n            price.clone(),\n        );\n        Ok(())\n    }\n\n    /// Get stored price for an offering.\n    pub fn get_price(env: Env, offering_id: String) -\u003e Option\u003cString\u003e {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::Price(offering_id))\n    }\n\n    pub fn update_metadata(\n        env: Env,\n        caller: Address,\n        offering_id: String,\n        metadata: String,\n    ) -\u003e Result\u003cString, VaultError\u003e {\n        caller.require_auth();\n        Self::require_owner(env.clone(), caller.clone())?;\n        if offering_id.len() \u003e MAX_OFFERING_ID_LEN {\n            return Err(VaultError::OfferingIdTooLong);\n        }\n        if metadata.len() \u003e MAX_METADATA_LEN {\n            return Err(VaultError::MetadataTooLong);\n        }\n        let old: String = env\n            .storage()\n            .instance()\n            .get(\u0026StorageKey::Metadata(offering_id.clone()))\n            .unwrap_or(String::from_str(\u0026env, \"\"));\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::Metadata(offering_id.clone()), \u0026metadata);\n        env.events().publish(\n            (Symbol::new(\u0026env, \"metadata_updated\"), offering_id, caller),\n            (old, metadata.clone()),\n        );\n        Ok(metadata)\n    }\n\n    /// Remove stored offering metadata (owner only).\n    ///\n    /// Deletes the `Metadata(offering_id)` storage key from instance storage.\n    /// Silently succeeds if the key does not exist (idempotent).\n    ///\n    /// # Errors\n    /// - `VaultError::Unauthorized` — caller is not the vault owner.\n    /// - `VaultError::OfferingIdTooLong` — `offering_id` exceeds `MAX_OFFERING_ID_LEN`.\n    pub fn remove_metadata(\n        env: Env,\n        caller: Address,\n        offering_id: String,\n    ) -\u003e Result\u003c(), VaultError\u003e {\n        caller.require_auth();\n        Self::require_owner(env.clone(), caller.clone())?;\n        if offering_id.len() \u003e MAX_OFFERING_ID_LEN {\n            return Err(VaultError::OfferingIdTooLong);\n        }\n        env.storage()\n            .instance()\n            .remove(\u0026StorageKey::Metadata(offering_id.clone()));\n        env.events().publish(\n            (Symbol::new(\u0026env, \"metadata_removed\"), offering_id, caller),\n            (),\n        );\n        Ok(())\n    }\n\n    /// Admin-gated contract upgrade.\n    ///\n    /// Only the current admin may call. This will instruct the host to update\n    /// the current contract WASM to `new_wasm_hash` and persist the version marker.\n    ///\n    /// # Parameters\n    /// - `caller` — must be the vault admin; signature required.\n    /// - `new_wasm_hash` — 32-byte hash of the new WASM code to deploy.\n    ///\n    /// # Panics\n    /// - `\"unauthorized: caller is not admin\"` — `caller` is not the admin.\n    ///\n    /// # Events\n    /// Emits an `upgraded` event with the admin as topic and the new WASM hash as data.\n    ///\n    /// # Post-Upgrade Migration\n    /// After calling `upgrade`, you may need to invoke a separate `migrate` function\n    /// (if implemented in the new WASM) to update storage schema or perform data migrations.\n    /// See UPGRADE.md for the complete operational flow.\n    pub fn upgrade(env: Env, caller: Address, new_wasm_hash: BytesN\u003c32\u003e) {\n        caller.require_auth();\n        let admin = Self::get_admin(env.clone()).expect(\"vault must be initialized before upgrade\");\n\n        // Perform the on-chain upgrade via the deployer interface.\n        // This is a host operation and may only succeed in the live environment.\n        env.deployer()\n            .update_current_contract_wasm(new_wasm_hash.clone());\n\n        // Persist the version marker for on-chain queries.\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::ContractVersion, \u0026new_wasm_hash);\n\n        // Emit an event for indexers / audit logs.\n        env.events()\n            .publish((Symbol::new(\u0026env, \"upgraded\"), admin), new_wasm_hash);\n    }\n\n    /// Read the stored contract version (WASM hash) as last set by `upgrade`.\n    ///\n    /// Returns `None` if no upgrade has been performed yet (initial deployment).\n    pub fn version(env: Env) -\u003e Option\u003cBytesN\u003c32\u003e\u003e {\n        env.storage().instance().get(\u0026StorageKey::ContractVersion)\n    }\n\n    // -----------------------------------------------------------------------\n    // Private helpers\n    // -----------------------------------------------------------------------\n\n    fn require_authorized_deduct_caller(env: Env, caller: \u0026Address) -\u003e Result\u003c(), VaultError\u003 0,"stats":{"Line":0}},{"line":1350,"address":[],"length":0,"stats":{"Line":0}}],"covered":551,"coverable":579},{"path":["/","Users","macbook","stellar","Callora-Contracts","contracts","vault","src","test.rs"],"content":"extern crate std;\n\nuse soroban_sdk::testutils::{Address as _, Events as _};\nuse soroban_sdk::{token, Address, Env, IntoVal, String, Symbol, TryFromVal};\n\nuse super::*;\n\nuse callora_settlement::CalloraSettlement;\n\n// ---------------------------------------------------------------------------\n// Test helpers\n// ---------------------------------------------------------------------------\n\nfn create_usdc\u003c'a\u003e(\n    env: \u0026'a Env,\n    admin: \u0026Address,\n) -\u003e (Address, token::Client\u003c'a\u003e, token::StellarAssetClient\u003c'a\u003e) {\n    let contract_address = env.register_stellar_asset_contract_v2(admin.clone());\n    let address = contract_address.address();\n    let client = token::Client::new(env, \u0026address);\n    let admin_client = token::StellarAssetClient::new(env, \u0026address);\n    (address, client, admin_client)\n}\n\nfn create_vault(env: \u0026Env) -\u003e (Address, CalloraVaultClient\u003c'_\u003e) {\n    let address = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(env, \u0026address);\n    (address, client)\n}\n\n/// Register and initialize the settlement contract.\nfn create_settlement(env: \u0026Env, admin: \u0026Address, vault_address: \u0026Address) -\u003e Address {\n    let settlement_address = env.register(CalloraSettlement, ());\n    let settlement_client =\n        callora_settlement::CalloraSettlementClient::new(env, \u0026settlement_address);\n    env.mock_all_auths();\n    settlement_client.init(admin, vault_address);\n    settlement_address\n}\n\n/// Mint `amount` USDC directly to `vault_address` (simulates pre-funded vault).\nfn fund_vault(\n    usdc_admin_client: \u0026token::StellarAssetClient,\n    vault_address: \u0026Address,\n    amount: i128,\n) {\n    usdc_admin_client.mint(vault_address, \u0026amount);\n}\n\n// ---------------------------------------------------------------------------\n// Init tests\n// ---------------------------------------------------------------------------\n\n#[test]\nfn init_with_balance_emits_event() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 1000);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(1000), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    let events = env.events().all();\n    std::println!(\"init_with_balance_emits_event events len: {}\", events.len());\n    let last = events.last().expect(\"expected at least one event\");\n\n    assert_eq!(last.0, vault_address);\n    let topics = \u0026last.1;\n    assert_eq!(topics.len(), 2);\n    let topic0: Symbol = topics.get(0).unwrap().into_val(\u0026env);\n    let topic1: Address = topics.get(1).unwrap().into_val(\u0026env);\n    assert_eq!(topic0, Symbol::new(\u0026env, \"init\"));\n    assert_eq!(topic1, owner);\n\n    let data: i128 = last.2.into_val(\u0026env);\n    assert_eq!(data, 1000);\n}\n\n#[test]\nfn init_defaults_balance_to_zero() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n    assert_eq!(client.balance(), 0);\n}\n\n#[test]\nfn init_defaults_min_deposit_to_one() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    let meta = client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n\n    assert_eq!(meta.min_deposit, 1);\n}\n\n#[test]\nfn init_sets_owner_and_min_deposit() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 500);\n    let meta = client.init(\u0026owner, \u0026usdc, \u0026Some(500), \u0026None, \u0026Some(10), \u0026None, \u0026None);\n\n    assert_eq!(meta.balance, 500);\n    assert_eq!(meta.owner, owner);\n    assert_eq!(meta.min_deposit, 10);\n    assert_eq!(client.balance(), 500);\n    assert_eq!(client.get_admin(), owner);\n}\n\n#[test]\nfn init_succeeds_when_onchain_usdc_balance_covers_initial_balance() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 500);\n\n    let meta = client.init(\u0026owner, \u0026usdc, \u0026Some(400), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    assert_eq!(meta.balance, 400);\n    assert_eq!(client.balance(), 400);\n}\n\n#[test]\nfn init_fails_when_initial_balance_exceeds_onchain_usdc_balance() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 99);\n\n    let result = client.try_init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n    assert!(result.is_err());\n}\n\n#[test]\nfn double_init_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    let result = client.try_init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n    assert!(result.is_err(), \"expected error on second init\");\n}\n\n// ---------------------------------------------------------------------------\n// get_meta / balance tests\n// ---------------------------------------------------------------------------\n\n#[test]\nfn get_meta_returns_correct_state() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 500);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(500), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    let meta = client.get_meta();\n    assert_eq!(meta.balance, 500);\n    assert_eq!(meta.owner, owner);\n    assert_eq!(client.balance(), 500);\n}\n\n#[test]\nfn get_meta_before_init_fails() {\n    let env = Env::default();\n    let (_, client) = create_vault(\u0026env);\n    assert!(client.try_get_meta().is_err(), \"expected error before init\");\n}\n\n// ---------------------------------------------------------------------------\n// Admin tests\n// ---------------------------------------------------------------------------\n\n#[test]\nfn get_admin_returns_owner_after_init() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    assert_eq!(client.get_admin(), owner);\n}\n\n#[test]\nfn set_admin_two_step_succeeds() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    client.set_admin(\u0026owner, \u0026new_admin);\n    assert_eq!(client.get_admin(), owner); // Still old admin\n\n    client.accept_admin();\n    assert_eq!(client.get_admin(), new_admin);\n}\n\n#[test]\nfn set_admin_unauthorized_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let intruder = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    let result = client.try_set_admin(\u0026intruder, \u0026new_admin);\n    assert!(\n        result.is_err(),\n        \"expected error when non-admin calls set_admin\"\n    );\n}\n\n// ---------------------------------------------------------------------------\n// Deposit tests\n// ---------------------------------------------------------------------------\n\n#[test]\nfn owner_can_deposit() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    // Swap order: create USDC first\n    let (usdc, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n    let (vault_address, client) = create_vault(\u0026env);\n\n    env.mock_all_auths();\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n\n    usdc_admin.mint(\u0026owner, \u0026500);\n    usdc_client.approve(\u0026owner, \u0026vault_address, \u0026300, \u00261000);\n\n    let new_balance = client.deposit(\u0026owner, \u0026200);\n    assert_eq!(new_balance, 200);\n\n    let events = env.events().all();\n    let deposit_event = events\n        .iter()\n        .find(|e| {\n            if e.0 != vault_address {\n                return false;\n            }\n            if e.1.is_empty() {\n                return false;\n            }\n            let s: Symbol = e.1.get(0).unwrap().into_val(\u0026env);\n            s == Symbol::new(\u0026env, \"deposit\")\n        })\n        .expect(\"expected deposit event\");\n\n    let (amount, balance): (i128, i128) = deposit_event.2.into_val(\u0026env);\n    assert_eq!(amount, 200);\n    assert_eq!(balance, 200);\n}\n\n#[test]\nfn allowed_depositor_can_deposit() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let depositor = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n    client.set_allowed_depositor(\u0026owner, \u0026Some(depositor.clone()));\n\n    usdc_admin.mint(\u0026depositor, \u0026200);\n    usdc_client.approve(\u0026depositor, \u0026vault_address, \u0026200, \u00261000);\n    let returned = client.deposit(\u0026depositor, \u0026200);\n\n    assert_eq!(returned, 300);\n    assert_eq!(client.balance(), 300);\n}\n\n#[test]\nfn unauthorized_address_cannot_deposit() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let unauthorized = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    let result = client.try_deposit(\u0026unauthorized, \u002650);\n    assert!(result.is_err());\n}\n\n#[test]\nfn deposit_zero_panics() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n    let result = client.try_deposit(\u0026owner, \u00260);\n    assert!(result.is_err());\n}\n\n#[test]\nfn deposit_negative_panics() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n    let result = client.try_deposit(\u0026owner, \u0026-50);\n    assert!(result.is_err());\n}\n\n#[test]\nfn deposit_below_minimum_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let depositor = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026Some(50), \u0026None, \u0026None);\n    client.set_allowed_depositor(\u0026owner, \u0026Some(depositor.clone()));\n\n    usdc_admin.mint(\u0026depositor, \u002630);\n    usdc_client.approve(\u0026depositor, \u0026vault_address, \u002630, \u00261000);\n    let result = client.try_deposit(\u0026depositor, \u002630);\n    assert!(result.is_err(), \"expected error for deposit below minimum\");\n}\n\n#[test]\nfn deposit_at_minimum_succeeds() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let depositor = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026Some(50), \u0026None, \u0026None);\n    client.set_allowed_depositor(\u0026owner, \u0026Some(depositor.clone()));\n\n    usdc_admin.mint(\u0026depositor, \u002650);\n    usdc_client.approve(\u0026depositor, \u0026vault_address, \u002650, \u00261000);\n    let new_balance = client.deposit(\u0026depositor, \u002650);\n    assert_eq!(new_balance, 150);\n}\n\n#[test]\nfn deposit_paused_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n\n    client.pause(\u0026owner);\n    assert!(client.is_paused());\n\n    usdc_admin.mint(\u0026owner, \u0026100);\n    usdc_client.approve(\u0026owner, \u0026vault_address, \u0026100, \u00261000);\n\n    let result = client.try_deposit(\u0026owner, \u0026100);\n    assert!(result.is_err());\n    // Should contain \"vault is paused\" but Error doesn't easily expose the string in tests without more setup\n    // but the transaction should fail.\n\n    client.unpause(\u0026owner);\n    assert!(!client.is_paused());\n    client.deposit(\u0026owner, \u0026100);\n    assert_eq!(client.balance(), 100);\n}\n\n// ---------------------------------------------------------------------------\n// Additional deposit unit tests (tasks 5.1, 5.2, 5.3)\n// ---------------------------------------------------------------------------\n\n/// Validates: Requirements 8.1, 5.2\n#[test]\nfn owner_deposit_increases_balance_and_emits_event() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (usdc, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n    let (vault_address, client) = create_vault(\u0026env);\n\n    env.mock_all_auths();\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n\n    usdc_admin.mint(\u0026owner, \u0026500);\n    usdc_client.approve(\u0026owner, \u0026vault_address, \u0026500, \u00261000);\n\n    let returned = client.deposit(\u0026owner, \u0026300);\n    assert_eq!(returned, 300);\n\n    // Capture events immediately after deposit, before any other contract call\n    // (each contract call resets the event log to that call's events only)\n    let events = env.events().all();\n    let deposit_event = events\n        .iter()\n        .find(|e| {\n            if e.0 != vault_address {\n                return false;\n            }\n            if e.1.is_empty() {\n                return false;\n            }\n            let s: Symbol = e.1.get(0).unwrap().into_val(\u0026env);\n            s == Symbol::new(\u0026env, \"deposit\")\n        })\n        .expect(\"expected deposit event\");\n\n    assert_eq!(\n        deposit_event.1.len(),\n        2,\n        \"topics must have exactly 2 entries (deposit, caller)\"\n    );\n    let topic0: Symbol = deposit_event.1.get(0).unwrap().into_val(\u0026env);\n    let topic1: Address = deposit_event.1.get(1).unwrap().into_val(\u0026env);\n    assert_eq!(topic0, Symbol::new(\u0026env, \"deposit\"));\n    assert_eq!(topic1, owner);\n\n    let (amount, new_balance): (i128, i128) = deposit_event.2.into_val(\u0026env);\n    assert_eq!(amount, 300);\n    assert_eq!(new_balance, 300);\n\n    // Balance check after event assertions\n    assert_eq!(client.balance(), 300);\n}\n\n/// Validates: Requirements 8.7, 4.2\n#[test]\nfn balance_unchanged_after_failed_deposit() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let unauthorized = Address::generate(\u0026env);\n    let (usdc, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n    let (vault_address, client) = create_vault(\u0026env);\n\n    env.mock_all_auths();\n    // min_deposit = 50\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026Some(50), \u0026None, \u0026None);\n\n    // Mint enough for the owner to deposit later (after unpause)\n    usdc_admin.mint(\u0026owner, \u0026200);\n    usdc_client.approve(\u0026owner, \u0026vault_address, \u0026200, \u002610_000);\n\n    let balance_before = client.balance();\n\n    // Scenario 1: unauthorized caller\n    let result = client.try_deposit(\u0026unauthorized, \u0026100);\n    assert!(result.is_err(), \"unauthorized caller must be rejected\");\n    assert_eq!(\n        client.balance(),\n        balance_before,\n        \"balance must be unchanged after unauthorized deposit\"\n    );\n\n    // Scenario 2: paused vault\n    client.pause(\u0026owner);\n    let result = client.try_deposit(\u0026owner, \u0026100);\n    assert!(result.is_err(), \"paused vault must reject deposit\");\n    assert_eq!(\n        client.balance(),\n        balance_before,\n        \"balance must be unchanged after paused deposit\"\n    );\n    client.unpause(\u0026owner);\n\n    // Scenario 3: below minimum (10 \u003c 50)\n    let result = client.try_deposit(\u0026owner, \u002610);\n    assert!(result.is_err(), \"below-minimum deposit must be rejected\");\n    assert_eq!(\n        client.balance(),\n        balance_before,\n        \"balance must be unchanged after below-minimum deposit\"\n    );\n}\n\n/// Validates: Requirements 5.1, 5.2, 5.3\n#[test]\nfn deposit_event_schema_alignment() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (usdc, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n    let (vault_address, client) = create_vault(\u0026env);\n\n    env.mock_all_auths();\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n\n    usdc_admin.mint(\u0026owner, \u0026200);\n    usdc_client.approve(\u0026owner, \u0026vault_address, \u0026200, \u002610_000);\n\n    client.deposit(\u0026owner, \u0026150);\n\n    let events = env.events().all();\n    let deposit_event = events\n        .iter()\n        .find(|e| {\n            if e.0 != vault_address {\n                return false;\n            }\n            if e.1.is_empty() {\n                return false;\n            }\n            let s: Symbol = e.1.get(0).unwrap().into_val(\u0026env);\n            s == Symbol::new(\u0026env, \"deposit\")\n        })\n        .expect(\"expected deposit event\");\n\n    // Schema alignment: exactly 2 topics (deposit, caller)\n    assert_eq!(\n        deposit_event.1.len(),\n        2,\n        \"deposit event must have exactly 2 topics\"\n    );\n    let topic0: Symbol = deposit_event.1.get(0).unwrap().into_val(\u0026env);\n    let topic1: Address = deposit_event.1.get(1).unwrap().into_val(\u0026env);\n    assert_eq!(\n        topic0,\n        Symbol::new(\u0026env, \"deposit\"),\n        \"topic[0] must be Symbol(\\\"deposit\\\")\"\n    );\n    assert_eq!(topic1, owner, \"topic[1] must be the depositor address\");\n\n    // Data must decode as (amount: i128, new_balance: i128)\n    let (amount, new_balance): (i128, i128) = deposit_event.2.into_val(\u0026env);\n    assert_eq!(amount, 150, \"event data amount must match deposited amount\");\n    assert_eq!(\n        new_balance, 150,\n        \"event data new_balance must match vault balance\"\n    );\n}\n\n// ---------------------------------------------------------------------------\n// Allowlist management tests\n// ---------------------------------------------------------------------------\n\n// ---------------------------------------------------------------------------\n// Allowed depositor management tests (backward compatibility)\n// ---------------------------------------------------------------------------\n\n#[test]\nfn owner_can_set_and_clear_allowed_depositor() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let depositor = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    // Set depositor\n    client.set_allowed_depositor(\u0026owner, \u0026Some(depositor.clone()));\n    usdc_admin.mint(\u0026depositor, \u002650);\n    usdc_client.approve(\u0026depositor, \u0026vault_address, \u002650, \u00261000);\n    client.deposit(\u0026depositor, \u002650);\n    assert_eq!(client.balance(), 150);\n\n    // Clear depositor\n    client.set_allowed_depositor(\u0026owner, \u0026None);\n\n    // Owner can still deposit\n    usdc_admin.mint(\u0026owner, \u002625);\n    usdc_client.approve(\u0026owner, \u0026vault_address, \u002625, \u00261000);\n    client.deposit(\u0026owner, \u002625);\n    assert_eq!(client.balance(), 175);\n}\n\n#[test]\nfn set_allowed_depositor_duplicate_is_ignored() {\n    // Adding the same depositor twice should not create a duplicate entry\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let depositor = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    client.set_allowed_depositor(\u0026owner, \u0026Some(depositor.clone()));\n    client.set_allowed_depositor(\u0026owner, \u0026Some(depositor.clone())); // duplicate should be a no-op\n\n    let list = client.get_allowed_depositors();\n    assert_eq!(list.len(), 1);\n\n    // depositor can still deposit exactly once (list not doubled)\n    usdc_admin.mint(\u0026depositor, \u002650);\n    usdc_client.approve(\u0026depositor, \u0026vault_address, \u002650, \u00261000);\n    assert_eq!(client.deposit(\u0026depositor, \u002650), 150);\n}\n\n#[test]\nfn non_owner_cannot_set_allowed_depositor() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let non_owner = Address::generate(\u0026env);\n    let depositor = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n    let result = client.try_set_allowed_depositor(\u0026non_owner, \u0026Some(depositor));\n    assert!(result.is_err());\n}\n\n#[test]\nfn deposit_after_depositor_cleared_is_rejected() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let depositor = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n    client.set_allowed_depositor(\u0026owner, \u0026Some(depositor.clone()));\n    client.set_allowed_depositor(\u0026owner, \u0026None);\n\n    usdc_admin.mint(\u0026depositor, \u002650);\n    usdc_client.approve(\u0026depositor, \u0026vault_address, \u002650, \u00261000);\n    let result = client.try_deposit(\u0026depositor, \u002650);\n    assert!(result.is_err());\n}\n\n// ---------------------------------------------------------------------------\n// Pause tests\n// ---------------------------------------------------------------------------\n\n#[test]\nfn pause_unpause_admin_only() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let intruder = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n\n    // intruder fails\n    let res = client.try_pause(\u0026intruder);\n    assert!(res.is_err());\n\n    // admin (owner) succeeds\n    client.pause(\u0026owner);\n    assert!(client.is_paused());\n\n    // intruder fails unpause\n    let res = client.try_unpause(\u0026intruder);\n    assert!(res.is_err());\n\n    // admin (owner) succeeds unpause\n    client.unpause(\u0026owner);\n    assert!(!client.is_paused());\n}\n\n#[test]\nfn pause_emits_event() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n\n    client.pause(\u0026owner);\n    let events = env.events().all();\n    let pause_event = events\n        .iter()\n        .find(|e| {\n            e.0 == vault_address\n                \u0026\u0026 e.1\n                    .get(0)\n                    .map(|v| {\n                        let s: Symbol = v.into_val(\u0026env);\n                        s == Symbol::new(\u0026env, \"vault_paused\")\n                    })\n                    .unwrap_or(false)\n        })\n        .expect(\"expected pause event\");\n\n    let admin_topic: Address = pause_event.1.get(1).unwrap().into_val(\u0026env);\n    assert_eq!(admin_topic, owner);\n}\n\n// ---------------------------------------------------------------------------\n// Deduct tests\n// ---------------------------------------------------------------------------\n\n#[test]\nfn set_authorized_caller_sets_and_emits_event() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let new_caller = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 200);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(200), \u0026None, \u0026None, \u0026None, \u0026None);\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    client.set_settlement(\u0026owner, \u0026settlement);\n\n    client.set_authorized_caller(\u0026Some(new_caller.clone()));\n\n    let events = env.events().all();\n    let ev = events.last().expect(\"expected set_authorized_caller event\");\n    assert_eq!(ev.1.len(), 2);\n\n    let topic0: Symbol = ev.1.get(0).unwrap().into_val(\u0026env);\n    let topic1: Address = ev.1.get(1).unwrap().into_val(\u0026env);\n    assert_eq!(topic0, Symbol::new(\u0026env, \"set_authorized_caller\"));\n    assert_eq!(topic1, owner);\n\n    let (old, now): (Option\u003cAddress\u003e, Option\u003cAddress\u003e) = ev.2.into_val(\u0026env);\n    assert_eq!(old, None);\n    assert_eq!(now, Some(new_caller.clone()));\n\n    let remaining = client.deduct(\u0026new_caller, \u002650, \u0026None);\n    assert_eq!(remaining, 150);\n}\n\n#[test]\nfn deduct_reduces_balance() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 300);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(300), \u0026None, \u0026None, \u0026None, \u0026None);\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    client.set_settlement(\u0026owner, \u0026settlement);\n\n    let returned = client.deduct(\u0026owner, \u002650, \u0026None);\n    assert_eq!(returned, 250);\n    assert_eq!(client.balance(), 250);\n}\n\n#[test]\nfn deduct_with_request_id() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 1000);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(1000), \u0026None, \u0026None, \u0026None, \u0026None);\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    client.set_settlement(\u0026owner, \u0026settlement);\n\n    let remaining = client.deduct(\u0026owner, \u0026100, \u0026Some(Symbol::new(\u0026env, \"req123\")));\n    assert_eq!(remaining, 900);\n}\n\n#[test]\nfn deduct_insufficient_balance_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 10);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(10), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    let result = client.try_deduct(\u0026owner, \u0026100, \u0026None);\n    assert!(result.is_err(), \"expected error for insufficient balance\");\n}\n\n#[test]\nfn deduct_exact_balance_succeeds() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 75);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(75), \u0026None, \u0026None, \u0026None, \u0026None);\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    client.set_settlement(\u0026owner, \u0026settlement);\n\n    let remaining = client.deduct(\u0026owner, \u002675, \u0026None);\n    assert_eq!(remaining, 0);\n    assert_eq!(client.balance(), 0);\n}\n\n#[test]\nfn deduct_event_contains_request_id() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 500);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(500), \u0026None, \u0026None, \u0026None, \u0026None);\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    client.set_settlement(\u0026owner, \u0026settlement);\n\n    let request_id = Symbol::new(\u0026env, \"api_call_42\");\n    client.deduct(\u0026owner, \u0026150, \u0026Some(request_id.clone()));\n\n    let events = env.events().all();\n    let ev = events.last().expect(\"expected deduct event\");\n\n    assert_eq!(ev.1.len(), 3, \"deduct event must always have 3 topics\");\n    let topic0: Symbol = ev.1.get(0).unwrap().into_val(\u0026env);\n    let topic1: Address = ev.1.get(1).unwrap().into_val(\u0026env);\n    let topic2: Symbol = ev.1.get(2).unwrap().into_val(\u0026env);\n\n    assert_eq!(topic0, Symbol::new(\u0026env, \"deduct\"));\n    assert_eq!(topic1, owner);\n    assert_eq!(topic2, request_id);\n\n    let (emitted_amount, remaining): (i128, i128) = ev.2.into_val(\u0026env);\n    assert_eq!(emitted_amount, 150);\n    assert_eq!(remaining, 350);\n}\n\n#[test]\nfn deduct_zero_amount_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026client.address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n    let result = client.try_deduct(\u0026owner, \u00260, \u0026None);\n    assert!(result.is_err());\n}\n\n#[test]\nfn deduct_exceeding_max_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026client.address, 1000);\n    // Set max_deduct to 500\n    client.init(\u0026owner, \u0026usdc, \u0026Some(1000), \u0026None, \u0026None, \u0026None, \u0026Some(500));\n    let result = client.try_deduct(\u0026owner, \u0026501, \u0026None);\n    assert!(result.is_err());\n}\n\n#[test]\nfn deduct_authorized_caller_succeeds() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let authorized = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    l
