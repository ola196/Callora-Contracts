);\n    let new_admin = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.set_admin(\u0026admin, \u0026new_admin);\n    client.claim_admin(\u0026attacker);\n}\n\n#[test]\nfn admin_transfer_emits_events() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n\n    // Step 1 event\n    client.set_admin(\u0026admin, \u0026new_admin);\n    let events = env.events().all();\n    let transfer_started = events.last().unwrap();\n\n    // FIX: Convert Val to Symbol for comparison\n    let event_name = Symbol::try_from_val(\u0026env, \u0026transfer_started.1.get(0).unwrap()).unwrap();\n    assert_eq!(event_name, Symbol::new(\u0026env, \"admin_transfer_started\"));\n\n    // Step 2 event\n    client.claim_admin(\u0026new_admin);\n    let events = env.events().all();\n    let transfer_completed = events.last().unwrap();\n\n    // FIX: Convert Val to Symbol for comparison\n    let event_name_comp =\n        Symbol::try_from_val(\u0026env, \u0026transfer_completed.1.get(0).unwrap()).unwrap();\n    assert_eq!(\n        event_name_comp,\n        Symbol::new(\u0026env, \"admin_transfer_completed\")\n    );\n}\n\n#[test]\nfn receive_payment_emits_event() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.receive_payment(\u0026admin, \u0026250, \u0026true);\n\n    let events = env.events().all();\n    let receive_payment_event = events.last().unwrap();\n    let event_name = Symbol::try_from_val(\u0026env, \u0026receive_payment_event.1.get(0).unwrap()).unwrap();\n    assert_eq!(event_name, Symbol::new(\u0026env, \"receive_payment\"));\n\n    let amount_and_source: (i128, bool) =\n        \u003c(i128, bool)\u003e::try_from_val(\u0026env, \u0026receive_payment_event.2).unwrap();\n    assert_eq!(amount_and_source, (250, true));\n}\n\n#[test]\n#[should_panic(expected = \"unauthorized: caller is not admin\")]\nfn receive_payment_non_admin_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.receive_payment(\u0026attacker, \u0026250, \u0026true);\n}\n\n#[test]\nfn receive_payment_is_event_only_and_does_not_move_tokens() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let developer = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 500);\n\n    let before_pool = usdc_client.balance(\u0026pool_addr);\n    let before_developer = usdc_client.balance(\u0026developer);\n\n    client.receive_payment(\u0026admin, \u0026250, \u0026true);\n\n    assert_eq!(usdc_client.balance(\u0026pool_addr), before_pool);\n    assert_eq!(usdc_client.balance(\u0026developer), before_developer);\n}\n\n// ---------------------------------------------------------------------------\n// Batch distribute tests - Comprehensive coverage\n// ---------------------------------------------------------------------------\n\n#[test]\nfn batch_distribute_success() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev1 = Address::generate(\u0026env);\n    let dev2 = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev1.clone(), 300_i128));\n    payments.push_back((dev2.clone(), 200_i128));\n    client.batch_distribute(\u0026admin, \u0026payments);\n\n    assert_eq!(usdc_client.balance(\u0026dev1), 300);\n    assert_eq!(usdc_client.balance(\u0026dev2), 200);\n    assert_eq!(client.balance(), 500);\n}\n\n#[test]\nfn batch_distribute_success_events() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev1 = Address::generate(\u0026env);\n    let dev2 = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev1.clone(), 300_i128));\n    payments.push_back((dev2.clone(), 200_i128));\n    client.batch_distribute(\u0026admin, \u0026payments);\n\n    let events = env.events().all();\n    assert!(events.len() \u003e= 4);\n\n    for i in 0..events.len() {\n        let (_, topics, data) = events.get(i).unwrap();\n        let topic_0 = topics.get(0).unwrap();\n        if let Ok(event_name) = Symbol::try_from_val(\u0026env, \u0026topic_0) {\n            if event_name == Symbol::new(\u0026env, \"batch_distribute\") {\n                let value: i128 = i128::try_from_val(\u0026env, \u0026data).unwrap();\n                assert!(value == 300 || value == 200);\n            }\n        }\n    }\n}\n\n#[test]\nfn receive_payment_emits_event_for_admin() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.receive_payment(\u0026admin, \u0026250, \u0026true);\n\n    let events = env.events().all();\n    let receive_event = events.last().unwrap();\n    let event_name = Symbol::try_from_val(\u0026env, \u0026receive_event.1.get(0).unwrap()).unwrap();\n    assert_eq!(event_name, Symbol::new(\u0026env, \"receive_payment\"));\n\n    let caller: Address = Address::try_from_val(\u0026env, \u0026receive_event.1.get(1).unwrap()).unwrap();\n    assert_eq!(caller, admin);\n\n    let (amount, from_vault): (i128, bool) = receive_event.2.into_val(\u0026env);\n    assert_eq!(amount, 250);\n    assert!(from_vault);\n}\n\n#[test]\n#[should_panic(expected = \"no pending admin\")]\nfn claim_admin_without_pending_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let candidate = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.claim_admin(\u0026candidate);\n}\n\n#[test]\n#[should_panic(expected = \"unauthorized: caller is not pending admin\")]\nfn claim_admin_wrong_caller_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let pending_admin = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.set_admin(\u0026admin, \u0026pending_admin);\n    client.claim_admin(\u0026attacker);\n}\n\n#[test]\n#[should_panic(expected = \"invalid recipient: cannot distribute to the contract itself\")]\nfn distribute_to_self_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 100);\n    client.distribute(\u0026admin, \u0026pool_addr, \u002650);\n}\n\n#[test]\n#[should_panic(expected = \"amount must be positive\")]\nfn batch_distribute_zero_amount_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc_address, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev, 0));\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n\n// ---------------------------------------------------------------------------\n// Event schema tests (Issue #256)\n// Each test below pins the exact topic/data layout documented in EVENT_SCHEMA.md\n// ---------------------------------------------------------------------------\n\n#[test]\nfn init_event_topics_and_data() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n\n    // topic 0 = \"init\"\n    let t0 = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n    assert_eq!(t0, Symbol::new(\u0026env, \"init\"));\n\n    // topic 1 = admin address\n    let t1 = Address::try_from_val(\u0026env, \u0026ev.1.get(1).unwrap()).unwrap();\n    assert_eq!(t1, admin);\n\n    // data = usdc_token address\n    let data = Address::try_from_val(\u0026env, \u0026ev.2).unwrap();\n    assert_eq!(data, usdc);\n}\n\n#[test]\nfn admin_transfer_started_event_topics_and_data() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.set_admin(\u0026admin, \u0026new_admin);\n\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n\n    // topic 0 = \"admin_transfer_started\"\n    let t0 = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n    assert_eq!(t0, Symbol::new(\u0026env, \"admin_transfer_started\"));\n\n    // topic 1 = current admin\n    let t1 = Address::try_from_val(\u0026env, \u0026ev.1.get(1).unwrap()).unwrap();\n    assert_eq!(t1, admin);\n\n    // data = pending admin\n    let data = Address::try_from_val(\u0026env, \u0026ev.2).unwrap();\n    assert_eq!(data, new_admin);\n}\n\n#[test]\nfn admin_transfer_completed_event_topics_and_data() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.set_admin(\u0026admin, \u0026new_admin);\n    client.claim_admin(\u0026new_admin);\n\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n\n    // topic 0 = \"admin_transfer_completed\"\n    let t0 = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n    assert_eq!(t0, Symbol::new(\u0026env, \"admin_transfer_completed\"));\n\n    // topic 1 = new admin\n    let t1 = Address::try_from_val(\u0026env, \u0026ev.1.get(1).unwrap()).unwrap();\n    assert_eq!(t1, new_admin);\n\n    // data = () empty\n    let _: () = ev.2.into_val(\u0026env);\n}\n\n#[test]\nfn receive_payment_event_from_vault_true() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.receive_payment(\u0026admin, \u00265_000_000, \u0026true);\n\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n\n    // topic 0 = \"receive_payment\"\n    let t0 = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n    assert_eq!(t0, Symbol::new(\u0026env, \"receive_payment\"));\n\n    // topic 1 = caller (admin)\n    let t1 = Address::try_from_val(\u0026env, \u0026ev.1.get(1).unwrap()).unwrap();\n    assert_eq!(t1, admin);\n\n    // data = (amount, from_vault)\n    let (amount, from_vault): (i128, bool) = ev.2.into_val(\u0026env);\n    assert_eq!(amount, 5_000_000);\n    assert!(from_vault);\n}\n\n#[test]\nfn receive_payment_event_from_vault_false() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    client.receive_payment(\u0026admin, \u00261_000_000, \u0026false);\n\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n\n    let (amount, from_vault): (i128, bool) = ev.2.into_val(\u0026env);\n    assert_eq!(amount, 1_000_000);\n    assert!(!from_vault);\n}\n\n#[test]\nfn distribute_event_topics_and_data() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let developer = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1_000_000);\n    client.distribute(\u0026admin, \u0026developer, \u00261_000_000);\n\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n\n    // topic 0 = \"distribute\"\n    let t0 = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n    assert_eq!(t0, Symbol::new(\u0026env, \"distribute\"));\n\n    // topic 1 = recipient\n    let t1 = Address::try_from_val(\u0026env, \u0026ev.1.get(1).unwrap()).unwrap();\n    assert_eq!(t1, developer);\n\n    // data = amount\n    let amount: i128 = ev.2.into_val(\u0026env);\n    assert_eq!(amount, 1_000_000);\n}\n\n#[test]\nfn batch_distribute_event_topics_and_data() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev1 = Address::generate(\u0026env);\n    let dev2 = Address::generate(\u0026env);\n    let dev3 = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 3_500_000);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev1.clone(), 1_000_000_i128));\n    payments.push_back((dev2.clone(), 2_000_000_i128));\n    payments.push_back((dev3.clone(), 500_000_i128));\n    client.batch_distribute(\u0026admin, \u0026payments);\n\n    let all_events = env.events().all();\n    let batch_events: std::vec::Vec\u003c_\u003e = all_events\n        .iter()\n        .filter(|e| {\n            e.1.get(0)\n                .and_then(|v| Symbol::try_from_val(\u0026env, \u0026v).ok())\n                .map(|s| s == Symbol::new(\u0026env, \"batch_distribute\"))\n                .unwrap_or(false)\n        })\n        .collect();\n\n    // 3 payments → 3 batch_distribute events\n    assert_eq!(batch_events.len(), 3);\n\n    // verify each event has correct topic 0 and a positive amount\n    for ev in batch_events.iter() {\n        let t0 = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n        assert_eq!(t0, Symbol::new(\u0026env, \"batch_distribute\"));\n        let amount: i128 = ev.2.into_val(\u0026env);\n        assert!(amount \u003e 0);\n    }\n}\n\n#[test]\nfn batch_distribute_is_atomic_all_or_nothing() {\n    // If any payment fails the entire batch reverts — no events emitted.\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev1 = Address::generate(\u0026env);\n    let dev2 = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 100);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev1.clone(), 60_i128));\n    payments.push_back((dev2.clone(), 60_i128)); // total 120 \u003e balance 100\n\n    let result = client.try_batch_distribute(\u0026admin, \u0026payments);\n    assert!(result.is_err());\n\n    // balance unchanged\n    assert_eq!(client.balance(), 100);\n}\n\n// ---------------------------------------------------------------------------\n// get_admin() and get_usdc_token() getter tests  (Issue #265)\n// ---------------------------------------------------------------------------\n\n#[test]\nfn get_admin_returns_correct_address() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n\n    assert_eq!(client.get_admin(), admin);\n}\n\n#[test]\nfn get_admin_reflects_updated_admin_after_transfer() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    assert_eq!(client.get_admin(), admin);\n\n    // Pending phase: get_admin() still returns old admin\n    client.set_admin(\u0026admin, \u0026new_admin);\n    assert_eq!(client.get_admin(), admin);\n\n    // After claim: admin updated\n    client.claim_admin(\u0026new_admin);\n    assert_eq!(client.get_admin(), new_admin);\n}\n\n#[test]\n#[should_panic(expected = \"revenue pool not initialized\")]\nfn get_admin_before_init_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let (_, client) = create_pool(\u0026env);\n\n    client.get_admin();\n}\n\n#[test]\nfn get_usdc_token_returns_correct_address() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n\n    assert_eq!(client.get_usdc_token(), usdc);\n}\n\n#[test]\nfn get_usdc_token_is_immutable_after_init() {\n    // The USDC token address must never change after initialization —\n    // this test guards against accidental mutation.\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n    let token_before = client.get_usdc_token();\n\n    // Admin transfer must not affect the token address\n    client.set_admin(\u0026admin, \u0026new_admin);\n    client.claim_admin(\u0026new_admin);\n\n    assert_eq!(client.get_usdc_token(), token_before);\n}\n\n#[test]\n#[should_panic(expected = \"revenue pool not initialized\")]\nfn get_usdc_token_before_init_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let (_, client) = create_pool(\u0026env);\n\n    client.get_usdc_token();\n}\n\n// ---------------------------------------------------------------------------\n// batch_distribute length-cap tests (resource exhaustion prevention)\n// ---------------------------------------------------------------------------\n\n#[test]\n#[should_panic(expected = \"batch_distribute requires at least one payment\")]\nfn batch_distribute_empty_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc_address, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n\n    let payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n\n#[test]\n#[should_panic(expected = \"batch too large\")]\nfn batch_distribute_too_large_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 100_000);\n\n    // Build a batch of MAX_BATCH_SIZE + 1 entries\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    for _ in 0..=crate::MAX_BATCH_SIZE {\n        payments.push_back((Address::generate(\u0026env), 1_i128));\n    }\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n\n#[test]\nfn batch_distribute_at_max_size_succeeds() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    let amount_per = 10_i128;\n    let total = amount_per * (crate::MAX_BATCH_SIZE as i128);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, total);\n\n    // Build a batch of exactly MAX_BATCH_SIZE entries\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    for _ in 0..crate::MAX_BATCH_SIZE {\n        payments.push_back((Address::generate(\u0026env), amount_per));\n    }\n    client.batch_distribute(\u0026admin, \u0026payments);\n\n    // Pool should be drained\n    assert_eq!(usdc_client.balance(\u0026pool_addr), 0);\n}\n\n#[test]\nfn upgrade_requires_admin() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n\n    let new_hash = BytesN::from_array(\u0026env, \u0026[1u8; 32]);\n\n    // Non-admin attempt should fail\n    let res = client.try_upgrade(\u0026attacker, \u0026new_hash);\n    assert!(res.is_err());\n}\n\n#[test]\n#[ignore = \"requires uploaded wasm artifact in host test environment\"]\nfn upgrade_sets_version_and_emits_event() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n\n    let new_hash = BytesN::from_array(\u0026env, \u0026[2u8; 32]);\n\n    client.upgrade(\u0026admin, \u0026new_hash);\n\n    // version() should return stored value\n    let readback: BytesN\u003c32\u003e = client.version();\n    assert_eq!(readback, new_hash);\n\n    // An `upgraded` event should have been emitted\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n    let name = Symbol::try_from_val(\u0026env, \u0026ev.1.get(0).unwrap()).unwrap();\n    assert_eq!(name, Symbol::new(\u0026env, \"upgraded\"));\n}\n\n#[test]\n#[should_panic(expected = \"amount must be positive\")]\nfn batch_distribute_negative_amount_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc_address, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev, -100));\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n\n#[test]\n#[should_panic(expected = \"unauthorized: caller is not admin\")]\nfn batch_distribute_unauthorized_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n    let dev = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev, 100));\n    client.batch_distribute(\u0026attacker, \u0026payments);\n}\n\n#[test]\n#[should_panic(expected = \"invalid recipient: cannot distribute to the contract itself\")]\nfn batch_distribute_self_recipient_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((pool_addr, 100));\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n\n// ---------------------------------------------------------------------------\n// TTL bump tests (Issue #342)\n// Tests that state persists after simulated ledger advance and views don't trigger TTL bump\n// ---------------------------------------------------------------------------\n\n#[test]\nfn state_persists_after_ledger_advance() {\n    // Test that state-modifying functions extend TTL so state remains accessible\n    // after a simulated ledger advance (archival risk mitigation)\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let developer = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    // Init extends TTL\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    // Verify state is accessible before ledger advance\n    assert_eq!(client.get_admin(), admin);\n    assert_eq!(client.get_usdc_token(), usdc_address);\n\n    // distribute extends TTL\n    client.distribute(\u0026admin, \u0026developer, \u0026100);\n    assert_eq!(usdc_client.balance(\u0026developer), 100);\n\n    // set_admin extends TTL\n    let new_admin = Address::generate(\u0026env);\n    client.set_admin(\u0026admin, \u0026new_admin);\n\n    // claim_admin extends TTL\n    client.claim_admin(\u0026new_admin);\n    assert_eq!(client.get_admin(), new_admin);\n\n    // batch_distribute extends TTL\n    let dev2 = Address::generate(\u0026env);\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev2.clone(), 100_i128));\n    client.batch_distribute(\u0026new_admin, \u0026payments);\n    assert_eq!(usdc_client.balance(\u0026dev2), 100);\n\n    // State remains accessible after all operations\n    assert_eq!(client.get_admin(), new_admin);\n    assert_eq!(client.get_usdc_token(), usdc_address);\n    assert_eq!(client.balance(), 800);\n}\n\n#[test]\nfn views_do_not_trigger_ttl_bump() {\n    // Verify that view functions work correctly without side effects.\n    // Views do not call extend_ttl, which is the expected behavior.\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let (_, client) = create_pool(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc);\n\n    // Call view functions - they should work but not extend TTL\n    let admin_result = client.get_admin();\n    assert_eq!(admin_result, admin);\n\n    let usdc_result = client.get_usdc_token();\n    assert_eq!(usdc_result, usdc);\n\n    let balance_result = client.balance();\n    assert_eq!(balance_result, 0);\n\n    // Views can be called multiple times without issue\n    assert_eq!(client.get_admin(), admin);\n    assert_eq!(client.get_usdc_token(), usdc);\n}\n\n// ---------------------------------------------------------------------------\n// Duplicate recipient tests — feature/revenue-pool-dedup-recipients\n// Policy: reject batches containing the same Address more than once.\n// ---------------------------------------------------------------------------\n\n#[test]\n#[should_panic(expected = \"duplicate recipient in batch\")]\nfn batch_distribute_duplicate_recipient_panics() {\n    // A batch where the same developer appears twice must be rejected entirely.\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev.clone(), 100_i128));\n    payments.push_back((dev.clone(), 200_i128)); // duplicate\n\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n\n#[test]\nfn batch_distribute_duplicate_does_not_transfer_any_funds() {\n    // Atomicity: a duplicate-recipient batch must leave balances completely unchanged.\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    let pool_balance_before = usdc_client.balance(\u0026pool_addr);\n    let dev_balance_before = usdc_client.balance(\u0026dev);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev.clone(), 100_i128));\n    payments.push_back((dev.clone(), 200_i128)); // duplicate\n\n    let result = client.try_batch_distribute(\u0026admin, \u0026payments);\n    assert!(result.is_err());\n\n    // No tokens moved.\n    assert_eq!(usdc_client.balance(\u0026pool_addr), pool_balance_before);\n    assert_eq!(usdc_client.balance(\u0026dev), dev_balance_before);\n}\n\n#[test]\nfn batch_distribute_duplicate_does_not_emit_events() {\n    // No batch_distribute events should be emitted when the call is rejected.\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    // Capture event count before the failing call.\n    let events_before = env.events().all().len();\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev.clone(), 100_i128));\n    payments.push_back((dev.clone(), 200_i128));\n\n    let _ = client.try_batch_distribute(\u0026admin, \u0026payments);\n\n    // Event log must not have grown with batch_distribute events.\n    let batch_events_after = env\n        .events()\n        .all()\n        .iter()\n        .skip(events_before as usize)\n        .filter(|e| {\n            e.1.get(0)\n                .and_then(|v| soroban_sdk::Symbol::try_from_val(\u0026env, \u0026v).ok())\n                .map(|s| s == soroban_sdk::Symbol::new(\u0026env, \"batch_distribute\"))\n                .unwrap_or(false)\n        })\n        .count();\n\n    assert_eq!(batch_events_after, 0);\n}\n\n#[test]\n#[should_panic(expected = \"duplicate recipient in batch\")]\nfn batch_distribute_duplicate_at_end_panics() {\n    // Duplicate at position n-1 (last entry) must still be caught.\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev1 = Address::generate(\u0026env);\n    let dev2 = Address::generate(\u0026env);\n    let dev3 = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 1000);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev1.clone(), 100_i128));\n    payments.push_back((dev2.clone(), 200_i128));\n    payments.push_back((dev3.clone(), 150_i128));\n    payments.push_back((dev1.clone(), 50_i128)); // dev1 again at the end\n\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n\n#[test]\nfn batch_distribute_unique_recipients_succeeds() {\n    // Sanity: a well-formed batch with all distinct addresses must still work.\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev1 = Address::generate(\u0026env);\n    let dev2 = Address::generate(\u0026env);\n    let dev3 = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, usdc_client, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 600);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev1.clone(), 100_i128));\n    payments.push_back((dev2.clone(), 200_i128));\n    payments.push_back((dev3.clone(), 300_i128));\n\n    client.batch_distribute(\u0026admin, \u0026payments);\n\n    assert_eq!(usdc_client.balance(\u0026dev1), 100);\n    assert_eq!(usdc_client.balance(\u0026dev2), 200);\n    assert_eq!(usdc_client.balance(\u0026dev3), 300);\n    assert_eq!(client.balance(), 0);\n}\n\n#[test]\n#[should_panic(expected = \"duplicate recipient in batch\")]\nfn batch_distribute_duplicate_detected_before_balance_check() {\n    // Duplicate detection must fire even when the pool has insufficient balance,\n    // proving it runs in Phase 1 (before the Phase 2 balance check).\n    // The panic message must be \"duplicate recipient in batch\", not \"insufficient USDC balance\".\n    let env = Env::default();\n    env.mock_all_auths();\n    let admin = Address::generate(\u0026env);\n    let dev = Address::generate(\u0026env);\n    let (pool_addr, client) = create_pool(\u0026env);\n    let (usdc_address, _, usdc_admin) = create_usdc(\u0026env, \u0026admin);\n\n    client.init(\u0026admin, \u0026usdc_address);\n    // Fund only 10, but the batch would need 300 — yet the duplicate error fires first.\n    fund_pool(\u0026usdc_admin, \u0026pool_addr, 10);\n\n    let mut payments: Vec\u003c(Address, i128)\u003e = Vec::new(\u0026env);\n    payments.push_back((dev.clone(), 100_i128));\n    payments.push_back((dev.clone(), 200_i128));\n\n    client.batch_distribute(\u0026admin, \u0026payments);\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","macbook","stellar","Callora-Contracts","contracts","revenue_pool","src","test_balance.rs"],"content":"use crate::{RevenuePool, RevenuePoolClient};\nuse soroban_sdk::{testutils::Address as _, Address, Env};\n\n#[test]\n#[should_panic(expected = \"revenue pool not initialized\")]\nfn test_balance_uninitialized_panics() {\n    let env = Env::default();\n    let addr = env.register(RevenuePool, ());\n    let client = RevenuePoolClient::new(\u0026env, \u0026addr);\n\n    // Calling balance before init should panic\n    client.balance();\n}\n\n#[test]\n#[should_panic(expected = \"unauthorized: caller is not admin\")]\nfn test_receive_payment_unauthorized_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n\n    let admin = Address::generate(\u0026env);\n    let usdc = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n\n    let addr = env.register(RevenuePool, ());\n    let client = RevenuePoolClient::new(\u0026env, \u0026addr);\n\n    client.init(\u0026admin, \u0026usdc);\n\n    // Call from unauthorized address should panic\n    client.receive_payment(\u0026attacker, \u0026100, \u0026false);\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","macbook","stellar","Callora-Contracts","contracts","settlement","src","lib.rs"],"content":"#![no_std]\n\nuse soroban_sdk::{\n    contract, contracterror, contractimpl, contracttype, token, Address, Env, Symbol, Vec,\n};\n\n/// Maximum number of items allowed in a single `batch_receive_payment` call.\npub const MAX_BATCH_SIZE: u32 = 50;\n\n/// Maximum number of developer balances returned per page in paginated queries.\npub const MAX_DEVELOPER_BALANCES_PAGE_SIZE: u32 = 100;\n\n/// Typed errors for the settlement contract.\n///\n/// Using `#[contracterror]` encodes each variant as a stable `u32` code.\n/// Callers and indexers can match on the code rather than parsing raw panic strings,\n/// and the WASM binary shrinks because no error string literals are embedded.\n///\n/// | Code | Variant                      | When                                              |\n/// |------|------------------------------|---------------------------------------------------|\n/// | 1    | NotInitialized               | A function is called before `init`                |\n/// | 2    | AlreadyInitialized           | `init` is called more than once                   |\n/// | 3    | Unauthorized                 | Caller is not the vault or admin                  |\n/// | 4    | AmountNotPositive            | `amount` is zero or negative                      |\n/// | 5    | DeveloperRequired            | `to_pool=false` but no developer address supplied |\n/// | 6    | DeveloperMustBeNone          | `to_pool=true` but a developer address was given  |\n/// | 7    | PoolOverflow                 | Global pool `i128` addition would overflow        |\n/// | 8    | DeveloperOverflow            | Developer balance `i128` addition would overflow  |\n/// | 9    | UsdcTokenNotConfigured       | USDC token address not configured for withdrawals |\n/// | 10   | InsufficientDeveloperBalance | Developer balance is less than withdrawal amount  |\n/// | 11   | DeveloperBalanceUnderflow    | Developer balance subtraction would overflow      |\n/// | 12   | InsufficientContractBalance  | Settlement contract lacks on-ledger USDC          |\n#[contracterror]\n#[derive(Clone, Copy, Debug, PartialEq)]\n#[repr(u32)]\npub enum SettlementError {\n    NotInitialized = 1,\n    AlreadyInitialized = 2,\n    Unauthorized = 3,\n    AmountNotPositive = 4,\n    DeveloperRequired = 5,\n    DeveloperMustBeNone = 6,\n    PoolOverflow = 7,\n    DeveloperOverflow = 8,\n    UsdcTokenNotConfigured = 9,\n    InsufficientDeveloperBalance = 10,\n    DeveloperBalanceUnderflow = 11,\n    InsufficientContractBalance = 12,\n}\n\n/// Persistent storage keys for settlement contract\n#[contracttype]\n#[derive(Clone, Debug, PartialEq)]\npub enum StorageKey {\n    Admin,\n    Vault,\n    PendingAdmin,\n    PendingVault,\n    DeveloperIndex,\n    DeveloperBalance(Address),\n    GlobalPool,\n    Usdc,\n}\n\n/// Developer balance record in settlement contract\n#[contracttype]\n#[derive(Clone, Debug, PartialEq)]\npub struct DeveloperBalance {\n    pub address: Address,\n    pub balance: i128,\n}\n\n/// Global pool balance tracking.\n///\n/// `last_updated` is set to `env.ledger().timestamp()` on every\n/// `receive_payment` call that credits the pool (`to_pool = true`).\n/// It is also set at `init` time. It is **not** updated when payments\n/// are routed to individual developer balances.\n#[contracttype]\n#[derive(Clone, Debug, PartialEq)]\npub struct GlobalPool {\n    pub total_balance: i128,\n    /// Ledger timestamp of the last pool credit. Useful for analytics\n    /// and staleness checks.\n    pub last_updated: u64,\n}\n\n/// Payment received event\n#[contracttype]\n#[derive(Clone, Debug, PartialEq)]\npub struct PaymentReceivedEvent {\n    pub from_vault: Address,\n    pub amount: i128,\n    pub to_pool: bool, // true if credited to global pool, false if to specific developer\n    pub developer: Option\u003cAddress\u003e, // developer address if credited to specific developer\n}\n\n/// Balance credited event\n#[contracttype]\n#[derive(Clone, Debug, PartialEq)]\npub struct BalanceCreditedEvent {\n    pub developer: Address,\n    pub amount: i128,\n    pub new_balance: i128,\n}\n\n/// Emitted when a new vault address is proposed via `propose_vault()`.\n#[contracttype]\n#[derive(Clone, Debug, PartialEq)]\npub struct VaultProposedEvent {\n    pub current_vault: Address,\n    pub proposed_vault: Address,\n}\n\n/// Emitted when the proposed vault is accepted via `accept_vault()`.\n#[contracttype]\n#[derive(Clone, Debug, PartialEq)]\npub struct VaultAcceptedEvent {\n    pub old_vault: Address,\n    pub new_vault: Address,\n    pub accepted_by: Address,\n}\n\n/// Emitted when a developer withdraws their balance.\n#[contracttype]\n#[derive(Clone, Debug, PartialEq)]\npub struct DeveloperWithdrawEvent {\n    pub developer: Address,\n    pub amount: i128,\n    pub remaining_balance: i128,\n}\n\n#[contract]\npub struct CalloraSettlement;\n\n#[contractimpl]\nimpl CalloraSettlement {\n    /// Initialize the settlement contract with admin and vault address.\n    ///\n    /// Persists admin + registered vault, initializes an empty developer index,\n    /// and stores a timestamped global pool.\n    ///\n    /// Storage keys written:\n    /// - `StorageKey::Admin`\n    /// - `StorageKey::Vault`\n    /// - `StorageKey::GlobalPool`\n    ///\n    /// # Panics\n    /// Panics if the contract is already initialized.\n    /// Panics if admin and vault_address are the same.\n    /// Panics if admin is the contract's own address.\n    /// Panics if vault_address is the contract's own address.\n    pub fn init(env: Env, admin: Address, vault_address: Address) {\n        admin.require_auth();\n        let inst = env.storage().instance();\n        if inst.has(\u0026StorageKey::Admin) {\n            env.panic_with_error(SettlementError::AlreadyInitialized);\n        }\n        if admin == vault_address {\n            panic!(\"invalid config: admin and vault_address must be distinct\");\n        }\n        if admin == env.current_contract_address() {\n            panic!(\"invalid config: admin cannot be the contract itself\");\n        }\n        if vault_address == env.current_contract_address() {\n            panic!(\"invalid config: vault_address cannot be the contract itself\");\n        }\n        inst.set(\u0026StorageKey::Admin, \u0026admin);\n        inst.set(\u0026StorageKey::Vault, \u0026vault_address);\n        let global_pool = GlobalPool {\n            total_balance: 0,\n            last_updated: env.ledger().timestamp(),\n        };\n        inst.set(\u0026StorageKey::GlobalPool, \u0026global_pool);\n    }\n\n    /// Receive payment from vault and credit to pool or developer balance.\n    ///\n    /// # Arguments\n    /// * `caller` - Must be authorized vault address or admin\n    /// * `amount` - Payment amount in USDC micro-units; must be \u003e 0\n    /// * `to_pool` - If true, credit global pool; if false, credit a specific developer\n    /// * `developer` - Required when `to_pool=false`; ignored when `to_pool=true`\n    ///\n    /// # Access Control\n    /// Only the registered vault address or admin can call this function.\n    ///\n    /// # Persistent Storage Operations\n    /// When crediting to developer balance:\n    /// - Performs O(1) point-read from persistent storage for the developer\n    /// - Updates the specific developer's balance in persistent storage\n    /// - Extends persistent TTL for the developer's balance entry\n    /// - Adds developer to index if not already present\n    /// - Does NOT iterate any maps; only point operations\n    ///\n    /// # Events\n    /// Always emits `payment_received`. Also emits `balance_credited` when `to_pool=false`.\n    ///\n    /// # Arithmetic Safety\n    /// Credits use checked arithmetic:\n    /// - Pool credits panic with `\"pool balance overflow\"` on `i128` overflow.\n    /// - Developer credits panic with `\"developer balance overflow\"` on `i128` overflow.\n    pub fn receive_payment(\n        env: Env,\n        caller: Address,\n        amount: i128,\n        to_pool: bool,\n        developer: Option\u003cAddress\u003e,\n    ) {\n        caller.require_auth();\n        Self::require_authorized_caller(env.clone(), caller.clone());\n        if amount \u003c= 0 {\n            env.panic_with_error(SettlementError::AmountNotPositive);\n        }\n        let inst = env.storage().instance();\n        if to_pool {\n            if developer.is_some() {\n                env.panic_with_error(SettlementError::DeveloperMustBeNone);\n            }\n            let mut global_pool = Self::get_global_pool(env.clone());\n            global_pool.total_balance = global_pool\n                .total_balance\n                .checked_add(amount)\n                .unwrap_or_else(|| env.panic_with_error(SettlementError::PoolOverflow));\n            global_pool.last_updated = env.ledger().timestamp();\n            inst.set(\u0026StorageKey::GlobalPool, \u0026global_pool);\n            env.events().publish(\n                (Symbol::new(\u0026env, \"payment_received\"), caller.clone()),\n                PaymentReceivedEvent {\n                    from_vault: caller.clone(),\n                    amount,\n                    to_pool: true,\n                    developer: None,\n                },\n            );\n        } else {\n            let dev_address = developer\n                .unwrap_or_else(|| env.panic_with_error(SettlementError::DeveloperRequired));\n\n            // Read current balance from persistent storage\n            let current_balance: i128 = env\n                .storage()\n                .persistent()\n                .get(\u0026StorageKey::DeveloperBalance(dev_address.clone()))\n                .unwrap_or(0i128);\n            let new_balance = current_balance\n                .checked_add(amount)\n                .unwrap_or_else(|| env.panic_with_error(SettlementError::DeveloperOverflow));\n\n            // Write to persistent storage with TTL extension\n            env.storage().persistent().set(\n                \u0026StorageKey::DeveloperBalance(dev_address.clone()),\n                \u0026new_balance,\n            );\n\n            // Extend TTL for the developer's balance entry (persistent storage live for 1 year)\n            env.storage().persistent().extend_ttl(\n                \u0026StorageKey::DeveloperBalance(dev_address.clone()),\n                50000,\n                50000,\n            );\n\n            // Add developer to index if not already present\n            let mut index: Vec\u003cAddress\u003e = inst\n                .get(\u0026StorageKey::DeveloperIndex)\n                .unwrap_or_else(|| Vec::new(\u0026env));\n            if !index.iter().any(|addr| addr == dev_address) {\n                index.push_back(dev_address.clone());\n                inst.set(\u0026StorageKey::DeveloperIndex, \u0026index);\n            }\n\n            env.events().publish(\n                (Symbol::new(\u0026env, \"payment_received\"), caller.clone()),\n                PaymentReceivedEvent {\n                    from_vault: caller.clone(),\n                    amount,\n                    to_pool: false,\n                    developer: Some(dev_address.clone()),\n                },\n            );\n            env.events().publish(\n                (Symbol::new(\u0026env, \"balance_credited\"), dev_address.clone()),\n                BalanceCreditedEvent {\n                    developer: dev_address,\n                    amount,\n                    new_balance,\n                },\n            );\n        }\n    }\n\n    /// Atomically credit multiple developer balances in a single call.\n    ///\n    /// # Arguments\n    /// * `caller` - Must be the registered vault address or admin\n    /// * `items` - Vec of `(developer_address, amount)` pairs; 1–[`MAX_BATCH_SIZE`] entries\n    ///\n    /// # Access Control\n    /// Only the registered vault address or admin can call this function.\n    ///\n    /// # Validation\n    /// All amounts must be `\u003e 0`. Empty and oversized batches are rejected before any state change.\n    ///\n    /// # Atomicity\n    /// All validation runs before any state is written. A failure on any item leaves the\n    /// contract state unchanged.\n    ///\n    /// # Events\n    /// Emits `balance_credited` for each item in the batch.\n    ///\n    /// # Panics\n    /// * `\"batch_receive_payment requires at least one item\"` — empty batch\n    /// * `\"batch too large\"` — more than [`MAX_BATCH_SIZE`] items\n    /// * `\"amount must be positive\"` — any amount ≤ 0\n    /// * `\"developer balance overflow\"` — `i128` overflow on any developer balance\n    pub fn batch_receive_payment(env: Env, caller: Address, items: Vec\u003c(Address, i128)\u003e) {\n        caller.require_auth();\n        Self::require_authorized_caller(env.clone(), caller.clone());\n\n        let n = items.len();\n        assert!(n \u003e 0, \"batch_receive_payment requires at least one item\");\n        assert!(n \u003c= MAX_BATCH_SIZE, \"batch too large\");\n\n        // Validate all amounts before touching state.\n        for item in items.iter() {\n            let (_, amount) = item;\n            assert!(amount \u003e 0, \"amount must be positive\");\n        }\n\n        let inst = env.storage().instance();\n\n        for item in items.iter() {\n            let (dev, amount) = item;\n            let current: i128 = env\n                .storage()\n                .persistent()\n                .get(\u0026StorageKey::DeveloperBalance(dev.clone()))\n                .unwrap_or(0);\n            let new_balance = current\n                .checked_add(amount)\n                .unwrap_or_else(|| env.panic_with_error(SettlementError::DeveloperOverflow));\n            env.storage()\n                .persistent()\n                .set(\u0026StorageKey::DeveloperBalance(dev.clone()), \u0026new_balance);\n            env.storage().persistent().extend_ttl(\n                \u0026StorageKey::DeveloperBalance(dev.clone()),\n                50000,\n                50000,\n            );\n            // Add to index if not already present\n            let mut index: Vec\u003cAddress\u003e = inst\n                .get(\u0026StorageKey::DeveloperIndex)\n                .unwrap_or_else(|| Vec::new(\u0026env));\n            if !index.iter().any(|a| a == dev) {\n                index.push_back(dev.clone());\n                inst.set(\u0026StorageKey::DeveloperIndex, \u0026index);\n            }\n            env.events().publish(\n                (Symbol::new(\u0026env, \"balance_credited\"), dev.clone()),\n                BalanceCreditedEvent {\n                    developer: dev.clone(),\n                    amount: amount,\n                    new_balance,\n                },\n            );\n        }\n    }\n\n    /// Get current admin address\n    pub fn get_admin(env: Env) -\u003e Address {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::Admin)\n            .unwrap_or_else(|| env.panic_with_error(SettlementError::NotInitialized))\n    }\n\n    /// Get registered vault address\n    pub fn get_vault(env: Env) -\u003e Address {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::Vault)\n            .unwrap_or_else(|| env.panic_with_error(SettlementError::NotInitialized))\n    }\n\n    /// Get global pool information\n    pub fn get_global_pool(env: Env) -\u003e GlobalPool {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::GlobalPool)\n            .unwrap_or_else(|| env.panic_with_error(SettlementError::NotInitialized))\n    }\n\n    /// Get developer balance\n    ///\n    /// Performs a direct O(1) persistent storage lookup for the specified developer's balance.\n    /// This is the preferred method for querying individual balances as it uses point storage.\n    ///\n    /// # Arguments\n    /// * `developer` - Developer address to query\n    ///\n    /// # Returns\n    /// Balance in USDC micro-units, or 0 if no balance recorded\n    ///\n    /// # Safety\n    /// Safe for all use cases; uses persistent storage with TTL.\n    pub fn get_developer_balance(env: Env, developer: Address) -\u003e i128 {\n        if !env.storage().instance().has(\u0026StorageKey::Admin) {\n            env.panic_with_error(SettlementError::NotInitialized);\n        }\n        env.storage()\n            .persistent()\n            .get(\u0026StorageKey::DeveloperBalance(developer))\n            .unwrap_or(0)\n    }\n\n    /// Configure the USDC token contract address.\n    ///\n    /// Only the current admin may set the on-chain USDC token address that this\n    /// contract will use to execute withdrawals.\n    pub fn set_usdc_token(env: Env, caller: Address, usdc_address: Address) {\n        caller.require_auth();\n        let current_admin = Self::get_admin(env.clone());\n        if caller != current_admin {\n            panic!(\"unauthorized: caller is not admin\");\n        }\n        if usdc_address == env.current_contract_address() {\n            panic!(\"invalid config: usdc_token cannot be the contract itself\");\n        }\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::Usdc, \u0026usdc_address);\n    }\n\n    fn get_usdc_token(env: Env) -\u003e Result\u003cAddress, SettlementError\u003e {\n        env.storage()\n            .instance()\n            .get(\u0026StorageKey::Usdc)\n            .ok_or(SettlementError::UsdcTokenNotConfigured)\n    }\n\n    /// Withdraw developer balance as USDC to the requesting developer.\n    ///\n    /// Requires the developer to authorize the request and the requested amount\n    /// to be positive and covered by the tracked developer balance.\n    pub fn withdraw_developer_balance(\n        env: Env,\n        developer: Address,\n        amount: i128,\n    ) -\u003e Result\u003c(), SettlementError\u003e {\n        developer.require_auth();\n        if amount \u003c= 0 {\n            return Err(SettlementError::AmountNotPositive);\n        }\n\n        let current_balance: i128 = env\n            .storage()\n            .persistent()\n            .get(\u0026StorageKey::DeveloperBalance(developer.clone()))\n            .unwrap_or(0);\n        if amount \u003e current_balance {\n            return Err(SettlementError::InsufficientDeveloperBalance);\n        }\n\n        let new_balance = current_balance\n            .checked_sub(amount)\n            .ok_or(SettlementError::DeveloperBalanceUnderflow)?;\n\n        let usdc_address = Self::get_usdc_token(env.clone())?;\n        let usdc = token::Client::new(\u0026env, \u0026usdc_address);\n        let contract_address = env.current_contract_address();\n\n        if usdc.balance(\u0026contract_address) \u003c amount {\n            return Err(SettlementError::InsufficientContractBalance);\n        }\n\n        usdc.transfer(\u0026contract_address, \u0026developer, \u0026amount);\n\n        env.storage().persistent().set(\n            \u0026StorageKey::DeveloperBalance(developer.clone()),\n            \u0026new_balance,\n        );\n        env.storage().persistent().extend_ttl(\n            \u0026StorageKey::DeveloperBalance(developer.clone()),\n            50000,\n            50000,\n        );\n\n        env.events().publish(\n            (Symbol::new(\u0026env, \"developer_withdraw\"), developer.clone()),\n            DeveloperWithdrawEvent {\n                developer,\n                amount,\n                remaining_balance: new_balance,\n            },\n        );\n\n        Ok(())\n    }\n\n    /// Get all developer balances (admin only)\n    ///\n    /// **CRITICAL**: Uses developer index for iteration; order is based on index insertion order.\n    /// Use this function only for administrative queries or reporting purposes.\n    /// For production integrations with many developers (\u003e100), implement off-chain indexing\n    /// by listening to `BalanceCreditedEvent` and maintaining a local database.\n    ///\n    /// # Arguments\n    /// * `caller` - Must be the current admin address.\n    ///\n    /// # Access Control\n    /// Only the current admin can call this function.\n    ///\n    /// # Iteration Behavior\n    /// - Uses developer index Vec for iteration; order is based on credit insertion order\n    /// - **Small index (\u003c 100 entries)**: Safe to iterate; yields current state\n    /// - **Large index (\u003e 100 entries)**: Consider off-chain indexing to avoid excessive gas costs\n    /// - **Order guarantees**: Based on insertion order (first credit = first in index)\n    ///\n    /// # Returns\n    /// Result containing a Vec of DeveloperBalance records or a gas exhaustion error.\n    /// Iteration order is based on index insertion order.\n    ///\n    /// # Use Cases\n    /// ✅ Administrative dashboards and reporting\n    /// ✅ Audit compliance queries\n    /// ✅ Contract state verification\n    /// ⚠️  Automatic routing based on iteration order (order is insertion-order stable but may not match business logic)\n    /// ❌ Deterministic selection of developers\n    ///\n    /// # Performance\n    /// Gas cost scales with number of developers:\n    /// - 50 developers: ~500 gas\n    /// - 100 developers: ~1,000 gas\n    /// - 500 developers: ~5,000 gas (consider off-chain indexing)\n    pub fn get_all_developer_balances(\n        env: Env,\n        caller: Address,\n    ) -\u003e Result\u003cVec\u003cDeveloperBalance\u003e, SettlementError\u003e {\n        caller.require_auth();\n        let admin = Self::get_admin(env.clone());\n        if caller != admin {\n            env.panic_with_error(SettlementError::Unauthorized);\n        }\n        let inst = env.storage().instance();\n        let index: Vec\u003cAddress\u003e = inst\n            .get(\u0026StorageKey::DeveloperIndex)\n            .unwrap_or_else(|| Vec::new(\u0026env));\n\n        let mut result = Vec::new(\u0026env);\n        for address in index.iter() {\n            let address_key = address.clone();\n            let balance: i128 = env\n                .storage()\n                .persistent()\n                .get(\u0026StorageKey::DeveloperBalance(address_key))\n                .unwrap_or(0i128);\n            result.push_back(DeveloperBalance {\n                address: address.clone(),\n                balance,\n            });\n        }\n        Ok(result)\n    }\n\n    /// Get a paginated slice of developer balances (admin only).\n    ///\n    /// This method avoids expensive full-index iteration by returning\n    /// a bounded window of developer balance records. Use it for\n    /// admin dashboards and off-chain pagination.\n    pub fn get_developer_balances_page(\n        env: Env,\n        caller: Address,\n        start: u32,\n        limit: u32,\n    ) -\u003e Result\u003cVec\u003cDeveloperBalance\u003e, SettlementError\u003e {\n        caller.require_auth();\n        let admin = Self::get_admin(env.clone());\n        if caller != admin {\n            panic!(\"unauthorized: caller is not admin\");\n        }\n\n        let inst = env.storage().instance();\n        let index: Vec\u003cAddress\u003e = inst\n            .get(\u0026StorageKey::DeveloperIndex)\n            .unwrap_or_else(|| Vec::new(\u0026env));\n\n        if limit == 0 || start \u003e= index.len() {\n            return Ok(Vec::new(\u0026env));\n        }\n\n        let end = start\n            .saturating_add(limit.min(MAX_DEVELOPER_BALANCES_PAGE_SIZE))\n            .min(index.len());\n        let mut result = Vec::new(\u0026env);\n        let mut cursor = 0;\n        for address in index.iter() {\n            if cursor \u003e= start \u0026\u0026 cursor \u003c end {\n                let balance = env\n                    .storage()\n                    .persistent()\n                    .get(\u0026StorageKey::DeveloperBalance(address.clone()))\n                    .unwrap_or(0);\n                result.push_back(DeveloperBalance {\n                    address: address.clone(),\n                    balance,\n                });\n            }\n            if cursor \u003e= end {\n                break;\n            }\n            cursor += 1;\n        }\n        Ok(result)\n    }\n\n    /// Return the pending admin address, or `None` if no transfer is in progress.\n    ///\n    /// Integrators can poll this to detect an in-flight two-step admin handover\n    /// before `accept_admin` is called.\n    ///\n    /// # Returns\n    /// `Some(Address)` of the nominated admin, or `None` when no transfer is pending.\n    pub fn get_pending_admin(env: Env) -\u003e Option\u003cAddress\u003e {\n        env.storage().instance().get(\u0026StorageKey::PendingAdmin)\n    }\n\n    /// Nominate a new admin (admin only).\n    ///\n    /// # Arguments\n    /// * `caller` - Current admin address; must match stored admin\n    /// * `new_admin` - Address to nominate as new admin\n    ///\n    /// # Access Control\n    /// Only the current admin can call this function.\n    ///\n    /// # Security\n    /// This implements a two-step admin transfer process:\n    /// 1. Current admin calls `set_admin()` to nominate new admin\n    /// 2. Nominated admin must call `accept_admin()` to complete transfer\n    ///\n    /// This prevents accidental admin loss and ensures the new admin\n    /// has control of their private keys before gaining privileges.\n    ///\n    /// # Events\n    /// Emits `admin_nominated` event with current and new admin addresses.\n    ///\n    /// # Panics\n    /// Panics if caller is not the current admin.\n    pub fn set_admin(env: Env, caller: Address, new_admin: Address) {\n        caller.require_auth();\n        let current_admin = Self::get_admin(env.clone());\n        if caller != current_admin {\n            env.panic_with_error(SettlementError::Unauthorized);\n        }\n        env.storage()\n            .instance()\n            .set(\u0026StorageKey::PendingAdmin, \u0026new_admin);\n\n        env.events().publish(\n            (\n                Symbol::new(\u0026env, \"admin_nominated\"),\n                current_admin,\n                new_admin,\n            ),\n            (),\n        );\n    }\n\n    /// Accept the admin role (pending admin only).\n    ///\n    /// # Access Control\n    /// Only the nominated pending admin can call this function.\n    ///\n    /// # Security\n    /// This is the second step of the two-step admin transfer process.\n    /// The nominated admin must explicitly accept, proving control of\n    /// their private keys before gaining admin privileges.\n    ///\n    /// # Events\n    /// Emits `admin_accepted` event with old and new admin addresses.\n    ///\n    /// # Panics\n    /// Panics if there is no pending admin transfer (i.e., `set_admin()`\n    /// was not called first).\n    pub fn accept_admin(env: Env) {\n        let inst = env.storage().instance();\n        let pending: Address = inst\n            .get(\u0026StorageKey::PendingAdmin)\n            .expect(\"no admin transfer pending\");\n        pending.require_auth();\n\n        let current = Self::get_admin(env.clone());\n        inst.set(\u0026StorageKey::Admin, \u0026pending);\n        inst.remove(\u0026StorageKey::PendingAdmin);\n\n        env.events()\n            .publish((Symbol::new(\u0026env, \"admin_accepted\"), current, pending), ());\n    }\n\n    /// Propose a new vault address (admin only).\n    ///\n    /// # Arguments\n    /// * `caller` - Current admin address; must match stored admin\n    /// * `new_vault` - New vault contract address to register\n    ///\n    /// # Access Control\n    /// Only the current admin can call this function.\n    ///\n    pub fn set_vault(env: Env, caller: Address, new_vault: Address) {\n        // Backwards-compatible alias: `set_vault` now behaves like `propose_vault`.\n        Self::propose_vault(env, caller, new_vault);\n    }\n\n    /// Propose a new vault address (admin only).\n    ///\n    /// This is the first step of a two-step vault rotation:\n    /// 1. Admin calls `propose_vault()` to set `PendingVault`\n    /// 2. Proposed vault (or admin) calls `accept_vault()` to activate it\n    ///\n    /// # Security\n    /// This prevents a typo from instantly routing settlement credits to the wrong contract.\n    ///\n    /// # Events\n    /// Emits `vault_proposed` with current and proposed vault addresses.\n    ///\n    /// # Panics\n    /// - `\"unauthorized: caller is not admin\"` if caller is not admin\n    /// - `\"invalid config: vault cannot be the contract itself\"` if proposed vault is this contract\n    pub fn propose_vault(env: Env, caller: Address, new_vault: Address) {\n        caller.require_auth();\n        let current_admin = Self::get_admin(env.clone());\n        if caller != current_admin {\n            env.panic_with_error(SettlementError::Unauthorized);\n        }\n        if new_vault == env.current_contract_address() {\n            panic!(\"invalid config: vault cannot be the contract itself\");\n        }\n\n        let inst = env.storage().instance();\n        let old_vault = Self::get_vault(env.clone());\n        inst.set(\u0026StorageKey::PendingVault, \u0026new_vault);\n\n        env.events().publish(\n            (Symbol::new(\u0026env, \"vault_proposed\"), caller),\n            VaultProposedEvent {\n                current_vault: old_vault,\n                proposed_vault: new_vault,\n            },\n        );\n    }\n\n    /// Accept the proposed vault and activate it.\n    ///\n    /// # Arguments\n    /// * `caller` - Must be either the proposed vault address or the admin.\n    ///\n    /// # Events\n    /// Emits `vault_accepted` with old vault, new vault, and acceptor.\n    ///\n    /// # Panics\n    /// - `\"no vault rotation pending\"` if no `propose_vault()` was called\n    /// - `\"unauthorized: caller must be pending vault or admin\"` if caller is neither\n    pub fn accept_vault(env: Env, caller: Address) {\n        caller.require_auth();\n\n        let inst = env.storage().instance();\n        let pending: Address = inst\n            .get(\u0026StorageKey::PendingVault)\n            .unwrap_or_else(|| panic!(\"no vault rotation pending\"));\n\n        let admin = Self::get_admin(env.clone());\n        if caller != pending \u0026\u0026 caller != admin {\n            panic!(\"unauthorized: caller must be pending vault or admin\");\n        }\n\n        let old_vault = Self::get_vault(env.clone());\n        inst.set(\u0026StorageKey::Vault, \u0026pending);\n        inst.remove(\u0026StorageKey::PendingVault);\n\n        env.events().publish(\n            (Symbol::new(\u0026env, \"vault_accepted\"), caller.clone()),\n            VaultAcceptedEvent {\n                old_vault,\n                new_vault: pending,\n                accepted_by: caller,\n            },\n        );\n    }\n\n    /// Internal function to require authorized caller (vault or admin)\n    fn require_authorized_caller(env: Env, caller: Address) {\n        let vault = Self::get_vault(env.clone());\n        let admin = Self::get_admin(env.clone());\n        if caller != vault \u0026\u0026 caller != admin {\n            env.panic_with_error(SettlementError::Unauthorized);\n        }\n    }\n}\n\n#[cfg(test)]\nmod test;\n\n#[cfg(test)]\nmod test_views;\n","traces":[{"line":153,"address":[],"length":0,"stats":{"Line":132}},{"line":154,"address":[],"length":0,"stats":{"Line":264}},{"line":155,"address":[],"length":0,"stats":{"Line":396}},{"line":156,"address":[],"length":0,"stats":{"Line":396}},{"line":157,"address":[],"length":0,"stats":{"Line":6}},{"line":159,"address":[],"length":0,"stats":{"Line":130}},{"line":160,"address":[],"length":0,"stats":{"Line":1}},{"line":162,"address":[],"length":0,"stats":{"Line":258}},{"line":163,"address":[],"length":0,"stats":{"Line":1}},{"line":165,"address":[],"length":0,"stats":{"Line":256}},{"line":166,"address":[],"length":0,"stats":{"Line":1}},{"line":168,"address":[],"length":0,"stats":{"Line":508}},{"line":169,"address":[],"l
