correctly\n/// - ✅ **Deterministic Outcome**: Attack either fails completely (Outcome A) or succeeds with exact accounting (Outcome B)\n/// - ✅ **Authorization Protection**: Re-entrant calls respect the same authorization checks as normal calls\n/// - ✅ **Invariant Preservation**: All balance validation occurs before external transfers complete\n#[test]\nfn test_reentry_protection_single_deduct() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, vault_client) = create_vault(\u0026env);\n\n    // Register malicious token\n    let malicious_token_addr = env.register(MaliciousToken, ());\n\n    env.mock_all_auths();\n\n    // Initialize vault with malicious token\n    vault_client.init(\n        \u0026owner,\n        \u0026malicious_token_addr,\n        \u0026Some(1000), // Start with 1000\n        \u0026None,\n        \u0026None,\n        \u0026None,\n        \u0026None,\n    );\n\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    vault_client.set_settlement(\u0026owner, \u0026settlement);\n\n    let malicious_client = MaliciousTokenClient::new(\u0026env, \u0026malicious_token_addr);\n\n    // Setup attack: when vault calls transfer, call back into vault.deduct(600).\n    // Initial: 1000.\n    // Call 1: deduct(500) -\u003e balance becomes 500 -\u003e calls transfer.\n    // Call 2 (Re-entrant): deduct(600) -\u003e sees balance 500 -\u003e PANIC \"insufficient balance\".\n    malicious_client.set_attack_config(\u0026vault_address, \u0026owner, \u0026600, \u00261);\n\n    let result = vault_client.try_deduct(\u0026owner, \u0026500, \u0026None);\n\n    // Acceptable Outcome A: Re-entrant call fails due to state guard (insufficient balance).\n    assert!(\n        result.is_err(),\n        \"Expected re-entrant call to fail due to insufficient balance\"\n    );\n\n    // Verify balance integrity: no extra deductions, no corruption.\n    // In Soroban, a panic in a sub-invocation reverts the entire tx.\n    assert_eq!(\n        vault_client.balance(),\n        1000,\n        \"Vault balance must remain consistent after failed attack\"\n    );\n}\n\n/// ### Test: Batch Deduct Re-entrancy\n///\n/// Verifies that re-entrancy during a batch operation cannot corrupt\n/// the running balance or total accounting.\n///\n/// **Security Guarantees Verified**:\n/// - ✅ **Batch Atomicity**: Full-batch validation completes before any state write or transfer\n/// - ✅ **Partial State Protection**: No partial state corruption possible during batch execution\n/// - ✅ **Running Balance Integrity**: The running balance calculation remains consistent throughout batch processing\n/// - ✅ **Deterministic Accounting**: Final balance equals expected deterministic value regardless of callback timing\n/// - ✅ **Invariant Enforcement**: All balance validations occur before external transfers\n#[test]\nfn test_reentry_protection_batch_deduct() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, vault_client) = create_vault(\u0026env);\n\n    let malicious_token_addr = env.register(MaliciousToken, ());\n    env.mock_all_auths();\n\n    vault_client.init(\n        \u0026owner,\n        \u0026malicious_token_addr,\n        \u0026Some(1000),\n        \u0026None,\n        \u0026None,\n        \u0026None,\n        \u0026None,\n    );\n\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    vault_client.set_settlement(\u0026owner, \u0026settlement);\n\n    let malicious_client = MaliciousTokenClient::new(\u0026env, \u0026malicious_token_addr);\n\n    // Batch total: 500.\n    // Re-entrant attack: deduct(600).\n    // 1000 - 500 = 500 remaining. 600 \u003e 500 -\u003e Fail.\n    malicious_client.set_attack_config(\u0026vault_address, \u0026owner, \u0026600, \u00261);\n\n    let items = soroban_sdk::vec![\n        \u0026env,\n        DeductItem {\n            amount: 300,\n            request_id: None\n        },\n        DeductItem {\n            amount: 200,\n            request_id: None\n        },\n    ];\n\n    let result = vault_client.try_batch_deduct(\u0026owner, \u0026items);\n\n    assert!(result.is_err());\n    assert_eq!(\n        vault_client.balance(),\n        1000,\n        \"Batch state must remain consistent\"\n    );\n}\n\n/// ### Test: Successful Re-entry with Correct Accounting\n///\n/// **Acceptable Outcome B**:\n/// If there is enough balance, a re-entrant call can execute, but it MUST\n/// update the balance correctly and not allow double-spending.\n///\n/// **Security Guarantees Verified**:\n/// - ✅ **Correct Balance Updates**: Re-entrant calls properly update `meta.balance` without corruption\n/// - ✅ **No Double-Spending**: Each deduction amount is accounted for exactly once\n/// - ✅ **Deterministic Final State**: Final accounting equals expected deterministic value\n/// - ✅ **State Authority**: Vault's internal balance remains the authoritative source of truth\n/// - ✅ **Callback Safety**: External callbacks cannot bypass accounting invariants\n#[test]\n#[ignore = \"soroban reentrancy incompatible\"]\nfn test_reentry_success_preserves_accounting() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, vault_client) = create_vault(\u0026env);\n\n    let malicious_token_addr = env.register(MaliciousToken, ());\n    env.mock_all_auths();\n\n    vault_client.init(\n        \u0026owner,\n        \u0026malicious_token_addr,\n        \u0026Some(1000),\n        \u0026None,\n        \u0026None,\n        \u0026None,\n        \u0026None,\n    );\n\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    vault_client.set_settlement(\u0026owner, \u0026settlement);\n\n    let malicious_client = MaliciousTokenClient::new(\u0026env, \u0026malicious_token_addr);\n\n    // Initial: 1000.\n    // Call 1: deduct(200) -\u003e balance = 800 -\u003e transfer calls back.\n    // Call 2 (Re-entrant): deduct(100) -\u003e sees balance 800 -\u003e balance = 700.\n    // Call 1 resumes.\n    malicious_client.set_attack_config(\u0026vault_address, \u0026owner, \u0026100, \u00261);\n\n    vault_client.deduct(\u0026owner, \u0026200, \u0026None);\n\n    // Final balance must be exactly 700.\n    assert_eq!(\n        vault_client.balance(),\n        700,\n        \"Final accounting must be deterministic and correct\"\n    );\n}\n\n/// ### Test: Multiple Nested Re-entry\n///\n/// Verifies that multiple layers of re-entrancy still preserve invariants.\n///\n/// **Security Guarantees Verified**:\n/// - ✅ **Nested Call Protection**: Multiple layers of re-entrancy cannot lead to exponential state corruption\n/// - ✅ **Depth Limitation**: Vault accounting remains consistent regardless of re-entry depth\n/// - ✅ **Invariant Preservation**: All balance validations occur at each re-entry level\n/// - ✅ **State Isolation**: Each re-entrant call operates on the current state without hidden mutations\n/// - ✅ **Deterministic Accounting**: Final balance equals expected deterministic value after all nested calls\n#[test]\n#[ignore = \"soroban reentrancy incompatible\"]\nfn test_nested_reentry_protection() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, vault_client) = create_vault(\u0026env);\n\n    let token_addr = env.register(MaliciousToken, ());\n    env.mock_all_auths();\n\n    vault_client.init(\u0026owner, \u0026token_addr, \u0026Some(1000), \u0026None, \u0026None, \u0026None, \u0026None);\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n\n    vault_client.set_settlement(\u0026owner, \u0026settlement);\n\n    let token_client = MaliciousTokenClient::new(\u0026env, \u0026token_addr);\n    // Try to re-enter 3 times, each deducting 100.\n    // Total should be: 100 (original) + 3 * 100 (re-entries) = 400.\n    token_client.set_attack_config(\u0026vault_address, \u0026owner, \u0026100, \u00263);\n\n    vault_client.deduct(\u0026owner, \u0026100, \u0026None);\n\n    assert_eq!(vault_client.balance(), 600);\n}\n\n/// ### Test: Re-entry with Exact Balance\n///\n/// Verifies that re-entry can exhaust the balance but not exceed it.\n///\n/// **Security Guarantees Verified**:\n/// - ✅ **Exact Exhaustion Safety**: Vault can be exhausted to zero balance without corruption\n/// - ✅ **Overflow Protection**: Attempts to exceed available balance fail deterministically\n/// - ✅ **Boundary Condition Handling**: Edge cases like exact balance matching are handled correctly\n/// - ✅ **State Consistency**: Balance remains authoritative even at boundary conditions\n/// - ✅ **Deterministic Outcomes**: All edge case scenarios produce predictable, verifiable results\n#[test]\n#[ignore = \"soroban reentrancy incompatible\"]\nfn test_reentry_exact_balance_exhaustion() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, vault_client) = create_vault(\u0026env);\n\n    let malicious_token_addr = env.register(MaliciousToken, ());\n    env.mock_all_auths();\n\n    vault_client.init(\n        \u0026owner,\n        \u0026malicious_token_addr,\n        \u0026Some(1000),\n        \u0026None,\n        \u0026None,\n        \u0026None,\n        \u0026None,\n    );\n\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    vault_client.set_settlement(\u0026owner, \u0026settlement);\n\n    let malicious_client = MaliciousTokenClient::new(\u0026env, \u0026malicious_token_addr);\n\n    // deduct(500) -\u003e balance 500.\n    // re-entry deduct(500) -\u003e balance 0. (Success)\n    malicious_client.set_attack_config(\u0026vault_address, \u0026owner, \u0026500, \u00261);\n\n    vault_client.deduct(\u0026owner, \u0026500, \u0026None);\n    assert_eq!(vault_client.balance(), 0);\n\n    // Try again with over-exhaustion\n    vault_client.deposit(\u0026owner, \u00261000);\n    // deduct(600) -\u003e balance 400.\n    // re-entry deduct(401) -\u003e Fail.\n    malicious_client.set_attack_config(\u0026vault_address, \u0026owner, \u0026401, \u00261);\n    let result = vault_client.try_deduct(\u0026owner, \u0026600, \u0026None);\n    assert!(result.is_err());\n    assert_eq!(vault_client.balance(), 1000);\n}\n\n/// ### Test: Near-Zero Balance Edge Case\n///\n/// Verifies that re-entrancy protection works correctly with minimal balances.\n/// Tests the boundary condition where balance = 1 and attack attempts to deduct 1 twice.\n#[test]\nfn test_reentry_near_zero_balance() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, vault_client) = create_vault(\u0026env);\n\n    let malicious_token_addr = env.register(MaliciousToken, ());\n    env.mock_all_auths();\n\n    // Initialize vault with near-zero balance\n    vault_client.init(\n        \u0026owner,\n        \u0026malicious_token_addr,\n        \u0026Some(1), // Start with balance = 1\n        \u0026None,\n        \u0026None,\n        \u0026None,\n        \u0026None,\n    );\n\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    vault_client.set_settlement(\u0026owner, \u0026settlement);\n\n    let malicious_client = MaliciousTokenClient::new(\u0026env, \u0026malicious_token_addr);\n\n    // Attempt re-entry with same amount as balance\n    // Initial: 1\n    // Call 1: deduct(1) -\u003e balance becomes 0 -\u003e calls transfer\n    // Call 2 (Re-entrant): deduct(1) -\u003e sees balance 0 -\u003e PANIC \"insufficient balance\"\n    malicious_client.set_attack_config(\u0026vault_address, \u0026owner, \u00261, \u00261);\n\n    let result = vault_client.try_deduct(\u0026owner, \u00261, \u0026None);\n\n    // Must fail due to insufficient balance in re-entrant call\n    assert!(result.is_err());\n\n    // Balance must remain unchanged (no corruption)\n    assert_eq!(\n        vault_client.balance(),\n        1,\n        \"Near-zero balance must remain consistent after failed attack\"\n    );\n}\n\n/// ### Test: Multiple Recipients in Batch\n///\n/// Verifies that re-entrancy during batch operations with multiple recipients\n/// cannot corrupt accounting or allow partial state mutation.\n#[test]\n#[ignore = \"soroban reentrancy incompatible\"]\nfn test_reentry_multiple_recipients_batch() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, vault_client) = create_vault(\u0026env);\n\n    let malicious_token_addr = env.register(MaliciousToken, ());\n    env.mock_all_auths();\n\n    vault_client.init(\n        \u0026owner,\n        \u0026malicious_token_addr,\n        \u0026Some(1000),\n        \u0026None,\n        \u0026None,\n        \u0026None,\n        \u0026None,\n    );\n\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    vault_client.set_settlement(\u0026owner, \u0026settlement);\n\n    let malicious_client = MaliciousTokenClient::new(\u0026env, \u0026malicious_token_addr);\n\n    // Configure attack to happen during batch processing\n    // Batch total: 600 (200 + 200 + 200)\n    // Re-entrant attack: deduct(300)\n    // After first 200 deduction: balance = 800, so 300 attack should succeed\n    malicious_client.set_attack_config(\u0026vault_address, \u0026owner, \u0026300, \u00261);\n\n    let items = soroban_sdk::vec![\n        \u0026env,\n        DeductItem {\n            amount: 200,\n            request_id: None\n        },\n        DeductItem {\n            amount: 200,\n            request_id: None\n        },\n        DeductItem {\n            amount: 200,\n            request_id: None\n        },\n    ];\n\n    vault_client.batch_deduct(\u0026owner, \u0026items);\n\n    // Final balance must be exactly 400 (1000 - 600)\n    // The re-entrant call should have deducted additional 300, so final should be 100\n    assert_eq!(\n        vault_client.balance(),\n        100,\n        \"Multiple recipients batch must preserve accounting integrity\"\n    );\n}\n\n/// ### Test: Callback After Partial Batch Execution\n///\n/// Verifies that re-entrancy protection works correctly when callback occurs\n/// after some items in a batch have been processed but before the batch completes.\n#[test]\n#[ignore = \"soroban reentrancy incompatible\"]\nfn test_reentry_callback_after_partial_batch() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, vault_client) = create_vault(\u0026env);\n\n    let malicious_token_addr = env.register(MaliciousToken, ());\n    env.mock_all_auths();\n\n    vault_client.init(\n        \u0026owner,\n        \u0026malicious_token_addr,\n        \u0026Some(1000),\n        \u0026None,\n        \u0026None,\n        \u0026None,\n        \u0026None,\n    );\n\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    vault_client.set_settlement(\u0026owner, \u0026settlement);\n\n    let malicious_client = MaliciousTokenClient::new(\u0026env, \u0026malicious_token_addr);\n\n    // Configure attack to happen during batch processing\n    // Batch: [300, 400] = 700 total\n    // After first 300 deduction: balance = 700\n    // Re-entrant attack: deduct(200) -\u003e should succeed, leaving balance = 500\n    malicious_client.set_attack_config(\u0026vault_address, \u0026owner, \u0026200, \u00261);\n\n    let items = soroban_sdk::vec![\n        \u0026env,\n        DeductItem {\n            amount: 300,\n            request_id: None\n        },\n        DeductItem {\n            amount: 400,\n            request_id: None\n        },\n    ];\n\n    vault_client.batch_deduct(\u0026owner, \u0026items);\n\n    // Final balance must be 1000 - 300 - 400 - 200 = 100\n    assert_eq!(\n        vault_client.balance(),\n        100,\n        \"Callback after partial batch must preserve accounting integrity\"\n    );\n}\n\n/// ### Test: Repeated Callback Attempts\n///\n/// Verifies that multiple layers of re-entrancy attempts are properly protected\n/// and cannot lead to exponential state corruption.\n#[test]\n#[ignore = \"soroban reentrancy incompatible\"]\nfn test_reentry_repeated_attempts() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, vault_client) = create_vault(\u0026env);\n\n    let malicious_token_addr = env.register(MaliciousToken, ());\n    env.mock_all_auths();\n\n    vault_client.init(\n        \u0026owner,\n        \u0026malicious_token_addr,\n        \u0026Some(1000),\n        \u0026None,\n        \u0026None,\n        \u0026None,\n        \u0026None,\n    );\n\n    let settlement = create_settlement(\u0026env, \u0026owner, \u0026vault_address);\n    vault_client.set_settlement(\u0026owner, \u0026settlement);\n\n    let malicious_client = MaliciousTokenClient::new(\u0026env, \u0026malicious_token_addr);\n\n    // Try to re-enter 5 times, each deducting 100.\n    // Total should be: 100 (original) + 5 * 100 (re-entries) = 600.\n    // This tests that the vault's balance validation prevents over-deduction\n    malicious_client.set_attack_config(\u0026vault_address, \u0026owner, \u0026100, \u00265);\n\n    vault_client.deduct(\u0026owner, \u0026100, \u0026None);\n\n    // With 5 re-entries of 100 each, plus original 100, total should be 600\n    // So final balance should be 1000 - 600 = 400\n    assert_eq!(vault_client.balance(), 400);\n}\n\n// ---------------------------------------------------------------------------\n// Upgrade tests (Issue #331)\n// ---------------------------------------------------------------------------\n\n#[test]\nfn upgrade_requires_admin() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let attacker = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    let new_hash = BytesN::from_array(\u0026env, \u0026[1u8; 32]);\n\n    // Non-admin attempt should fail\n    let res = client.try_upgrade(\u0026attacker, \u0026new_hash);\n    assert!(res.is_err(), \"non-admin should not be able to upgrade\");\n}\n\n#[test]\n#[ignore = \"requires uploaded wasm artifact in host test environment\"]\nfn upgrade_sets_version_and_emits_event() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    // Version should be None before any upgrade\n    assert_eq!(client.version(), None);\n\n    let new_hash = BytesN::from_array(\u0026env, \u0026[2u8; 32]);\n\n    client.upgrade(\u0026owner, \u0026new_hash);\n\n    // version() should return stored value\n    let readback = client.version();\n    assert_eq!(readback, Some(new_hash.clone()));\n\n    // An `upgraded` event should have been emitted\n    let events = env.events().all();\n    let ev = events.last().unwrap();\n    assert_eq!(ev.0, vault_address);\n\n    let name: Symbol = ev.1.get(0).unwrap().into_val(\u0026env);\n    assert_eq!(name, Symbol::new(\u0026env, \"upgraded\"));\n\n    let admin_topic: Address = ev.1.get(1).unwrap().into_val(\u0026env);\n    assert_eq!(admin_topic, owner);\n\n    let data: BytesN\u003c32\u003e = ev.2.into_val(\u0026env);\n    assert_eq!(data, new_hash);\n}\n\n#[test]\n#[ignore = \"requires uploaded wasm artifact in host test environment\"]\nfn upgrade_non_owner_admin_succeeds() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    // Transfer admin to new_admin\n    client.set_admin(\u0026owner, \u0026new_admin);\n    client.accept_admin();\n    assert_eq!(client.get_admin(), new_admin);\n\n    let new_hash = BytesN::from_array(\u0026env, \u0026[3u8; 32]);\n\n    // new_admin should be able to upgrade\n    client.upgrade(\u0026new_admin, \u0026new_hash);\n\n    let readback = client.version();\n    assert_eq!(readback, Some(new_hash));\n}\n\n#[test]\nfn upgrade_owner_not_admin_fails() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let new_admin = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    // Transfer admin to new_admin\n    client.set_admin(\u0026owner, \u0026new_admin);\n    client.accept_admin();\n    assert_eq!(client.get_admin(), new_admin);\n\n    let new_hash = BytesN::from_array(\u0026env, \u0026[4u8; 32]);\n\n    // owner (no longer admin) should fail\n    let res = client.try_upgrade(\u0026owner, \u0026new_hash);\n    assert!(\n        res.is_err(),\n        \"owner without admin role should not be able to upgrade\"\n    );\n}\n\n#[test]\nfn version_returns_none_before_first_upgrade() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    assert_eq!(client.version(), None);\n}\n\n#[test]\n#[ignore = \"requires uploaded wasm artifact in host test environment\"]\nfn upgrade_multiple_times_updates_version() {\n    let env = Env::default();\n    let owner = Address::generate(\u0026env);\n    let (vault_address, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, 100);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    let hash1 = BytesN::from_array(\u0026env, \u0026[5u8; 32]);\n    client.upgrade(\u0026owner, \u0026hash1);\n    assert_eq!(client.version(), Some(hash1.clone()));\n\n    let hash2 = BytesN::from_array(\u0026env, \u0026[6u8; 32]);\n    client.upgrade(\u0026owner, \u0026hash2);\n    assert_eq!(client.version(), Some(hash2.clone()));\n\n    let hash3 = BytesN::from_array(\u0026env, \u0026[7u8; 32]);\n    client.upgrade(\u0026owner, \u0026hash3);\n    assert_eq!(client.version(), Some(hash3));\n}\n\n// ---------------------------------------------------------------------------\n// BUDGET MEASUREMENT TESTS — for benchmarking and cost analysis\n// ---------------------------------------------------------------------------\n\n/// Captures CPU, memory, and ledger read/write metrics from Soroban budget.\n#[derive(Clone)]\nstruct BudgetSnapshot {\n    cpu_instructions: u64,\n    memory_bytes: u64,\n    ledger_read_bytes: u64,\n    ledger_write_bytes: u64,\n}\n\nimpl BudgetSnapshot {\n    /// Capture the current budget state from the environment.\n    fn capture(env: \u0026Env) -\u003e Self {\n        let ce = env.cost_estimate();\n        let res = ce.resources();\n        Self {\n            cpu_instructions: res.instructions as u64,\n            memory_bytes: res.mem_bytes as u64,\n            ledger_read_bytes: res.read_bytes as u64,\n            ledger_write_bytes: res.write_bytes as u64,\n        }\n    }\n\n    /// Calculate delta between two snapshots (after - before).\n    fn delta(\u0026self, before: \u0026BudgetSnapshot) -\u003e BudgetSnapshot {\n        BudgetSnapshot {\n            cpu_instructions: self\n                .cpu_instructions\n                .saturating_sub(before.cpu_instructions),\n            memory_bytes: self.memory_bytes.saturating_sub(before.memory_bytes),\n            ledger_read_bytes: self\n                .ledger_read_bytes\n                .saturating_sub(before.ledger_read_bytes),\n            ledger_write_bytes: self\n                .ledger_write_bytes\n                .saturating_sub(before.ledger_write_bytes),\n        }\n    }\n}\n\n/// Helper function to set up a fully initialized vault with settlement and sufficient balance.\nfn setup_vault_for_deduct(env: \u0026Env, initial_balance: i128) -\u003e (Address, CalloraVaultClient) {\n    let owner = Address::generate(env);\n    let (vault_address, client) = create_vault(env);\n    let (usdc, _, usdc_admin) = create_usdc(env, \u0026owner);\n\n    env.mock_all_auths();\n    fund_vault(\u0026usdc_admin, \u0026vault_address, initial_balance);\n    client.init(\n        \u0026owner,\n        \u0026usdc,\n        \u0026Some(initial_balance),\n        \u0026None,\n        \u0026None,\n        \u0026None,\n        \u0026None,\n    );\n    let settlement = create_settlement(env, \u0026owner, \u0026vault_address);\n    client.set_settlement(\u0026owner, \u0026settlement);\n\n    (owner, client)\n}\n\n/// Benchmark: measure the cost of a single `deduct` operation.\n///\n/// Prints CPU instructions, memory, ledger read/write metrics in CSV format for analysis.\n#[test]\n#[ignore]\nfn budget_measure_single_deduct() {\n    let env = Env::default();\n    let (owner, client) = setup_vault_for_deduct(\u0026env, 100_000_000);\n\n    let before = BudgetSnapshot::capture(\u0026env);\n    client.deduct(\u0026owner, \u00261_000_000, \u0026None);\n    let after = BudgetSnapshot::capture(\u0026env);\n\n    let delta = after.delta(\u0026before);\n    std::println!(\n        \"BUDGET_SINGLE_DEDUCT,cpu_instructions,{},memory_bytes,{},ledger_read_bytes,{},ledger_write_bytes,{}\",\n        delta.cpu_instructions, delta.memory_bytes, delta.ledger_read_bytes, delta.ledger_write_bytes\n    );\n}\n\n/// Benchmark: measure the cost of `batch_deduct` with batch size = 1.\n///\n/// For comparison: a batch of 1 item should have similar cost to single deduct,\n/// with possible overhead from the batch validation loop.\n#[test]\n#[ignore]\nfn budget_measure_batch_deduct_size_1() {\n    let env = Env::default();\n    let (owner, client) = setup_vault_for_deduct(\u0026env, 100_000_000);\n\n    let items = soroban_sdk::vec![\n        \u0026env,\n        DeductItem {\n            amount: 1_000_000,\n            request_id: None\n        }\n    ];\n\n    let before = BudgetSnapshot::capture(\u0026env);\n    client.batch_deduct(\u0026owner, \u0026items);\n    let after = BudgetSnapshot::capture(\u0026env);\n\n    let delta = after.delta(\u0026before);\n    std::println!(\n        \"BUDGET_BATCH_DEDUCT_SIZE_1,cpu_instructions,{},memory_bytes,{},ledger_read_bytes,{},ledger_write_bytes,{}\",\n        delta.cpu_instructions, delta.memory_bytes, delta.ledger_read_bytes, delta.ledger_write_bytes\n    );\n}\n\n/// Benchmark: measure the cost of `batch_deduct` with batch size = 10.\n///\n/// Captures the incremental cost of processing 10 items in a single call.\n#[test]\n#[ignore]\nfn budget_measure_batch_deduct_size_10() {\n    let env = Env::default();\n    let (owner, client) = setup_vault_for_deduct(\u0026env, 100_000_000);\n\n    let mut items = soroban_sdk::Vec::new(\u0026env);\n    for _ in 0..10 {\n        items.push_back(DeductItem {\n            amount: 1_000_000,\n            request_id: Some(Symbol::new(\u0026env, \"req\")),\n        });\n    }\n\n    let before = BudgetSnapshot::capture(\u0026env);\n    client.batch_deduct(\u0026owner, \u0026items);\n    let after = BudgetSnapshot::capture(\u0026env);\n\n    let delta = after.delta(\u0026before);\n    std::println!(\n        \"BUDGET_BATCH_DEDUCT_SIZE_10,cpu_instructions,{},memory_bytes,{},ledger_read_bytes,{},ledger_write_bytes,{}\",\n        delta.cpu_instructions, delta.memory_bytes, delta.ledger_read_bytes, delta.ledger_write_bytes\n    );\n}\n\n/// Benchmark: measure the cost of `batch_deduct` with batch size = 25.\n///\n/// Tests mid-range batching to identify potential scaling inflection points.\n#[test]\n#[ignore]\nfn budget_measure_batch_deduct_size_25() {\n    let env = Env::default();\n    let (owner, client) = setup_vault_for_deduct(\u0026env, 100_000_000);\n\n    let mut items = soroban_sdk::Vec::new(\u0026env);\n    for _ in 0..25 {\n        items.push_back(DeductItem {\n            amount: 500_000,\n            request_id: Some(Symbol::new(\u0026env, \"req\")),\n        });\n    }\n\n    let before = BudgetSnapshot::capture(\u0026env);\n    client.batch_deduct(\u0026owner, \u0026items);\n    let after = BudgetSnapshot::capture(\u0026env);\n\n    let delta = after.delta(\u0026before);\n    std::println!(\n        \"BUDGET_BATCH_DEDUCT_SIZE_25,cpu_instructions,{},memory_bytes,{},ledger_read_bytes,{},ledger_write_bytes,{}\",\n        delta.cpu_instructions, delta.memory_bytes, delta.ledger_read_bytes, delta.ledger_write_bytes\n    );\n}\n\n/// Benchmark: measure the cost of `batch_deduct` with batch size = 50 (MAX_BATCH_SIZE).\n///\n/// Tests the maximum allowed batch size to understand the upper-bound cost.\n#[test]\n#[ignore]\nfn budget_measure_batch_deduct_size_50() {\n    let env = Env::default();\n    let (owner, client) = setup_vault_for_deduct(\u0026env, 100_000_000);\n\n    let mut items = soroban_sdk::Vec::new(\u0026env);\n    for _ in 0..50 {\n        items.push_back(DeductItem {\n            amount: 300_000,\n            request_id: Some(Symbol::new(\u0026env, \"req\")),\n        });\n    }\n\n    let before = BudgetSnapshot::capture(\u0026env);\n    client.batch_deduct(\u0026owner, \u0026items);\n    let after = BudgetSnapshot::capture(\u0026env);\n\n    let delta = after.delta(\u0026before);\n    std::println!(\n        \"BUDGET_BATCH_DEDUCT_SIZE_50,cpu_instructions,{},memory_bytes,{},ledger_read_bytes,{},ledger_write_bytes,{}\",\n        delta.cpu_instructions, delta.memory_bytes, delta.ledger_read_bytes, delta.ledger_write_bytes\n    );\n}\n\n/// Run all budget benchmarks in sequence.\n///\n/// This is a convenience function for easily running the entire benchmark suite.\n/// Execute with: `cargo test budget_measure_all -- --ignored --nocapture`\n#[test]\n#[ignore]\nfn budget_measure_all() {\n    std::println!(\"\\n=== VAULT BUDGET MEASUREMENT SUITE ===\\n\");\n\n    // Single deduct baseline\n    budget_measure_single_deduct();\n\n    // Batch deduct at various sizes\n    budget_measure_batch_deduct_size_1();\n    budget_measure_batch_deduct_size_10();\n    budget_measure_batch_deduct_size_25();\n    budget_measure_batch_deduct_size_50();\n\n    std::println!(\"\\n=== END VAULT BUDGET MEASUREMENTS ===\\n\");\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","macbook","stellar","Callora-Contracts","contracts","vault","src","test_idempotency.rs"],"content":"/// Tests for request_id idempotency in `deduct` and `batch_deduct`.\n///\n/// # Coverage\n/// - Duplicate `Some(request_id)` is rejected with `DuplicateRequestId`.\n/// - Distinct `request_id` values each succeed independently.\n/// - `None` request_id is never deduplicated (fire-and-forget).\n/// - `batch_deduct` rejects a batch containing a duplicate id atomically.\n/// - `batch_deduct` rejects a batch where two items share the same new id.\n/// - `is_request_processed` view reflects processed state correctly.\n/// - Failed deducts (insufficient balance, paused) do NOT mark the id.\nextern crate std;\n\nuse soroban_sdk::testutils::Address as _;\nuse soroban_sdk::{token, Address, Env, Symbol};\n\nuse super::*;\n\nuse callora_settlement::CalloraSettlement;\n\n// ---------------------------------------------------------------------------\n// Helpers\n// ---------------------------------------------------------------------------\n\nfn create_usdc\u003c'a\u003e(\n    env: \u0026'a Env,\n    admin: \u0026Address,\n) -\u003e (Address, token::Client\u003c'a\u003e, token::StellarAssetClient\u003c'a\u003e) {\n    let ca = env.register_stellar_asset_contract_v2(admin.clone());\n    let addr = ca.address();\n    (\n        addr.clone(),\n        token::Client::new(env, \u0026addr),\n        token::StellarAssetClient::new(env, \u0026addr),\n    )\n}\n\nfn create_vault(env: \u0026Env) -\u003e (Address, CalloraVaultClient\u003c'_\u003e) {\n    let addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(env, \u0026addr);\n    (addr, client)\n}\n\n/// Register and initialize the settlement contract.\nfn create_settlement(env: \u0026Env, admin: \u0026Address, vault_address: \u0026Address) -\u003e Address {\n    let settlement_address = env.register(CalloraSettlement, ());\n    let settlement_client =\n        callora_settlement::CalloraSettlementClient::new(env, \u0026settlement_address);\n    settlement_client.init(admin, vault_address);\n    settlement_address\n}\n\n/// Set up a vault with `balance` USDC, a settlement address, and return\n/// `(vault_addr, client, settlement_addr, owner)`.\nfn setup_vault(env: \u0026Env, balance: i128) -\u003e (Address, CalloraVaultClient\u003c'_\u003e, Address, Address) {\n    env.mock_all_auths();\n    let owner = Address::generate(env);\n    let (vault_addr, client) = create_vault(env);\n    let (usdc, _, usdc_admin) = create_usdc(env, \u0026owner);\n    usdc_admin.mint(\u0026vault_addr, \u0026balance);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(balance), \u0026None, \u0026None, \u0026None, \u0026None);\n    let settlement = create_settlement(env, \u0026owner, \u0026vault_addr);\n    client.set_settlement(\u0026owner, \u0026settlement);\n    (vault_addr, client, settlement, owner)\n}\n\n// ---------------------------------------------------------------------------\n// deduct — single call idempotency\n// ---------------------------------------------------------------------------\n\n/// Pin the numeric error code so a future renumber regression is caught immediately.\n#[test]\nfn duplicate_request_id_error_code_is_29() {\n    assert_eq!(VaultError::DuplicateRequestId as u32, 29);\n}\n\n/// A `Some(request_id)` deduct succeeds on first call and is rejected on retry.\n#[test]\nfn deduct_duplicate_request_id_rejected() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 1_000);\n\n    let rid = Symbol::new(\u0026env, \"req_001\");\n\n    // First call — must succeed.\n    let remaining = client.deduct(\u0026owner, \u0026100, \u0026Some(rid.clone()));\n    assert_eq!(remaining, 900);\n\n    // Second call with same request_id — must be rejected.\n    let result = client.try_deduct(\u0026owner, \u0026100, \u0026Some(rid.clone()));\n    assert!(result.is_err(), \"duplicate request_id must be rejected\");\n\n    // Balance must be unchanged after the rejected retry.\n    assert_eq!(\n        client.balance(),\n        900,\n        \"balance must not change on duplicate\"\n    );\n}\n\n/// Two distinct `request_id` values each succeed independently.\n#[test]\nfn deduct_distinct_request_ids_both_succeed() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 1_000);\n\n    let rid_a = Symbol::new(\u0026env, \"req_a\");\n    let rid_b = Symbol::new(\u0026env, \"req_b\");\n\n    let after_a = client.deduct(\u0026owner, \u0026100, \u0026Some(rid_a.clone()));\n    assert_eq!(after_a, 900);\n\n    let after_b = client.deduct(\u0026owner, \u0026200, \u0026Some(rid_b.clone()));\n    assert_eq!(after_b, 700);\n\n    assert_eq!(client.balance(), 700);\n}\n\n/// `None` request_id is never deduplicated — multiple calls all go through.\n#[test]\nfn deduct_none_request_id_not_deduplicated() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 1_000);\n\n    // Three calls with None — all must succeed.\n    assert_eq!(client.deduct(\u0026owner, \u0026100, \u0026None), 900);\n    assert_eq!(client.deduct(\u0026owner, \u0026100, \u0026None), 800);\n    assert_eq!(client.deduct(\u0026owner, \u0026100, \u0026None), 700);\n    assert_eq!(client.balance(), 700);\n}\n\n/// A failed deduct (insufficient balance) must NOT mark the request_id as processed.\n#[test]\nfn deduct_failed_due_to_insufficient_balance_does_not_mark_id() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 50);\n\n    let rid = Symbol::new(\u0026env, \"req_fail\");\n\n    // Attempt to deduct more than the balance — must fail.\n    let result = client.try_deduct(\u0026owner, \u0026100, \u0026Some(rid.clone()));\n    assert!(result.is_err(), \"expected insufficient balance error\");\n\n    // The id must NOT be marked — a retry with sufficient balance should succeed.\n    // Top up the vault first.\n    // (We can't deposit here without a depositor setup, so we verify via is_request_processed.)\n    assert!(\n        !client.is_request_processed(\u0026rid),\n        \"failed deduct must not mark request_id\"\n    );\n}\n\n/// A failed deduct (vault paused) must NOT mark the request_id as processed.\n#[test]\nfn deduct_failed_due_to_paused_does_not_mark_id() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 500);\n\n    let rid = Symbol::new(\u0026env, \"req_paused\");\n\n    client.pause(\u0026owner);\n    let result = client.try_deduct(\u0026owner, \u0026100, \u0026Some(rid.clone()));\n    assert!(result.is_err(), \"expected paused error\");\n\n    assert!(\n        !client.is_request_processed(\u0026rid),\n        \"paused deduct must not mark request_id\"\n    );\n}\n\n// ---------------------------------------------------------------------------\n// is_request_processed view\n// ---------------------------------------------------------------------------\n\n/// `is_request_processed` returns false before any deduct.\n#[test]\nfn is_request_processed_false_before_deduct() {\n    let env = Env::default();\n    let (_, client, _, _) = setup_vault(\u0026env, 500);\n\n    let rid = Symbol::new(\u0026env, \"unseen\");\n    assert!(!client.is_request_processed(\u0026rid));\n}\n\n/// `is_request_processed` returns true after a successful deduct with that id.\n#[test]\nfn is_request_processed_true_after_successful_deduct() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 500);\n\n    let rid = Symbol::new(\u0026env, \"seen\");\n    client.deduct(\u0026owner, \u002650, \u0026Some(rid.clone()));\n\n    assert!(\n        client.is_request_processed(\u0026rid),\n        \"is_request_processed must return true after successful deduct\"\n    );\n}\n\n/// `is_request_processed` returns false for a different id even after another was processed.\n#[test]\nfn is_request_processed_false_for_different_id() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 500);\n\n    let rid_a = Symbol::new(\u0026env, \"id_a\");\n    let rid_b = Symbol::new(\u0026env, \"id_b\");\n\n    client.deduct(\u0026owner, \u002650, \u0026Some(rid_a.clone()));\n\n    assert!(client.is_request_processed(\u0026rid_a));\n    assert!(!client.is_request_processed(\u0026rid_b));\n}\n\n// ---------------------------------------------------------------------------\n// batch_deduct — idempotency\n// ---------------------------------------------------------------------------\n\n/// A batch containing a previously-processed `request_id` is rejected atomically.\n#[test]\nfn batch_deduct_duplicate_request_id_rejected_atomically() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 1_000);\n\n    let rid = Symbol::new(\u0026env, \"batch_dup\");\n\n    // First single deduct marks the id.\n    client.deduct(\u0026owner, \u0026100, \u0026Some(rid.clone()));\n    assert_eq!(client.balance(), 900);\n\n    // Batch that reuses the same id — must be rejected atomically.\n    let items = soroban_sdk::vec![\n        \u0026env,\n        DeductItem {\n            amount: 50,\n            request_id: Some(rid.clone()),\n        },\n        DeductItem {\n            amount: 50,\n            request_id: None,\n        },\n    ];\n    let result = client.try_batch_deduct(\u0026owner, \u0026items);\n    assert!(result.is_err(), \"batch with duplicate id must be rejected\");\n\n    // Balance must be unchanged — full atomicity.\n    assert_eq!(\n        client.balance(),\n        900,\n        \"balance must not change on duplicate batch\"\n    );\n}\n\n/// A batch where two items share the same new `request_id` is rejected.\n#[test]\nfn batch_deduct_two_items_same_new_id_rejected() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 1_000);\n\n    let rid = Symbol::new(\u0026env, \"shared_id\");\n\n    // Both items carry the same id — the second one is a duplicate of the first.\n    let items = soroban_sdk::vec![\n        \u0026env,\n        DeductItem {\n            amount: 100,\n            request_id: Some(rid.clone()),\n        },\n        DeductItem {\n            amount: 100,\n            request_id: Some(rid.clone()),\n        },\n    ];\n    let result = client.try_batch_deduct(\u0026owner, \u0026items);\n    assert!(\n        result.is_err(),\n        \"batch with two items sharing the same new id must be rejected\"\n    );\n\n    // Balance must be unchanged.\n    assert_eq!(client.balance(), 1_000);\n    // The id must NOT have been marked (batch was rejected).\n    assert!(\n        !client.is_request_processed(\u0026rid),\n        \"rejected batch must not mark request_id\"\n    );\n}\n\n/// A batch with all distinct `Some` ids succeeds and marks all of them.\n#[test]\nfn batch_deduct_distinct_ids_all_succeed_and_marked() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 1_000);\n\n    let rid_1 = Symbol::new(\u0026env, \"b_id_1\");\n    let rid_2 = Symbol::new(\u0026env, \"b_id_2\");\n    let rid_3 = Symbol::new(\u0026env, \"b_id_3\");\n\n    let items = soroban_sdk::vec![\n        \u0026env,\n        DeductItem {\n            amount: 100,\n            request_id: Some(rid_1.clone()),\n        },\n        DeductItem {\n            amount: 200,\n            request_id: Some(rid_2.clone()),\n        },\n        DeductItem {\n            amount: 50,\n            request_id: Some(rid_3.clone()),\n        },\n    ];\n    let remaining = client.batch_deduct(\u0026owner, \u0026items);\n    assert_eq!(remaining, 650);\n\n    // All three ids must now be marked.\n    assert!(client.is_request_processed(\u0026rid_1));\n    assert!(client.is_request_processed(\u0026rid_2));\n    assert!(client.is_request_processed(\u0026rid_3));\n}\n\n/// A batch with `None` ids succeeds and does not mark anything.\n#[test]\nfn batch_deduct_none_ids_not_marked() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 1_000);\n\n    let items = soroban_sdk::vec![\n        \u0026env,\n        DeductItem {\n            amount: 100,\n            request_id: None,\n        },\n        DeductItem {\n            amount: 200,\n            request_id: None,\n        },\n    ];\n    let remaining = client.batch_deduct(\u0026owner, \u0026items);\n    assert_eq!(remaining, 700);\n\n    // No ids were provided — nothing should be marked.\n    // We verify by checking a sentinel id is still unprocessed.\n    let sentinel = Symbol::new(\u0026env, \"sentinel\");\n    assert!(!client.is_request_processed(\u0026sentinel));\n}\n\n/// A batch that fails due to insufficient balance does NOT mark any ids.\n#[test]\nfn batch_deduct_failed_insufficient_balance_does_not_mark_ids() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 100);\n\n    let rid_a = Symbol::new(\u0026env, \"fail_a\");\n    let rid_b = Symbol::new(\u0026env, \"fail_b\");\n\n    let items = soroban_sdk::vec![\n        \u0026env,\n        DeductItem {\n            amount: 60,\n            request_id: Some(rid_a.clone()),\n        },\n        DeductItem {\n            amount: 60, // cumulative 120 \u003e 100\n            request_id: Some(rid_b.clone()),\n        },\n    ];\n    let result = client.try_batch_deduct(\u0026owner, \u0026items);\n    assert!(result.is_err(), \"expected insufficient balance error\");\n\n    // Neither id must be marked.\n    assert!(!client.is_request_processed(\u0026rid_a));\n    assert!(!client.is_request_processed(\u0026rid_b));\n    assert_eq!(client.balance(), 100);\n}\n\n/// After a successful deduct, retrying with the same id returns DuplicateRequestId\n/// regardless of the amount.\n#[test]\nfn deduct_retry_with_different_amount_still_rejected() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 1_000);\n\n    let rid = Symbol::new(\u0026env, \"retry_amt\");\n\n    client.deduct(\u0026owner, \u0026100, \u0026Some(rid.clone()));\n\n    // Retry with a different amount — still rejected.\n    let result = client.try_deduct(\u0026owner, \u002650, \u0026Some(rid.clone()));\n    assert!(\n        result.is_err(),\n        \"retry with different amount must be rejected\"\n    );\n    assert_eq!(client.balance(), 900);\n}\n\n/// Mixed batch: some items have `Some` ids, some have `None`.\n/// All `Some` ids are marked; `None` items are not.\n#[test]\nfn batch_deduct_mixed_ids_marks_only_some_ids() {\n    let env = Env::default();\n    let (_, client, _, owner) = setup_vault(\u0026env, 1_000);\n\n    let rid_x = Symbol::new(\u0026env, \"mix_x\");\n    let rid_z = Symbol::new(\u0026env, \"mix_z\");\n\n    let items = soroban_sdk::vec![\n        \u0026env,\n        DeductItem {\n            amount: 100,\n            request_id: Some(rid_x.clone()),\n        },\n        DeductItem {\n            amount: 50,\n            request_id: None,\n        },\n        DeductItem {\n            amount: 75,\n            request_id: Some(rid_z.clone()),\n        },\n    ];\n    let remaining = client.batch_deduct(\u0026owner, \u0026items);\n    assert_eq!(remaining, 775);\n\n    assert!(client.is_request_processed(\u0026rid_x));\n    assert!(client.is_request_processed(\u0026rid_z));\n\n    // Retrying either Some id must fail.\n    assert!(client.try_deduct(\u0026owner, \u002610, \u0026Some(rid_x)).is_err());\n    assert!(client.try_deduct(\u0026owner, \u002610, \u0026Some(rid_z)).is_err());\n\n    // None deducts still go through.\n    assert_eq!(client.deduct(\u0026owner, \u002610, \u0026None), 765);\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","macbook","stellar","Callora-Contracts","contracts","vault","src","test_init_hardening.rs"],"content":"extern crate std;\n\nuse soroban_sdk::testutils::Address as _;\nuse soroban_sdk::{token, Address, Env};\n\nuse super::*;\n\n// ---------------------------------------------------------------------------\n// Helpers\n// ---------------------------------------------------------------------------\n\nfn create_usdc\u003c'a\u003e(\n    env: \u0026'a Env,\n    admin: \u0026Address,\n) -\u003e (Address, token::Client\u003c'a\u003e, token::StellarAssetClient\u003c'a\u003e) {\n    let ca = env.register_stellar_asset_contract_v2(admin.clone());\n    let addr = ca.address();\n    (\n        addr.clone(),\n        token::Client::new(env, \u0026addr),\n        token::StellarAssetClient::new(env, \u0026addr),\n    )\n}\n\nfn create_vault(env: \u0026Env) -\u003e (Address, CalloraVaultClient\u003c'_\u003e) {\n    let addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(env, \u0026addr);\n    (addr, client)\n}\n\n// ---------------------------------------------------------------------------\n// Re-init guard\n// ---------------------------------------------------------------------------\n\n#[test]\nfn reinit_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n    let result = client.try_init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n    assert!(result.is_err(), \"second init must fail\");\n}\n\n#[test]\nfn reinit_via_try_returns_err() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n    let result = client.try_init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n    assert!(result.is_err(), \"second init must return Err\");\n}\n\n// ---------------------------------------------------------------------------\n// usdc_token validation\n// ---------------------------------------------------------------------------\n\n#[test]\nfn init_usdc_token_is_vault_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (vault_addr, client) = create_vault(\u0026env);\n\n    let result = client.try_init(\u0026owner, \u0026vault_addr, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n    assert!(result.is_err());\n}\n\n// ---------------------------------------------------------------------------\n// min_deposit validation\n// ---------------------------------------------------------------------------\n\n#[test]\nfn init_min_deposit_zero_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    let result = client.try_init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026Some(0), \u0026None, \u0026None);\n    assert!(result.is_err());\n}\n\n#[test]\nfn init_min_deposit_negative_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    let result = client.try_init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026Some(-1), \u0026None, \u0026None);\n    assert!(result.is_err());\n}\n\n#[test]\nfn init_min_deposit_one_succeeds() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    let meta = client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026Some(1), \u0026None, \u0026None);\n    assert_eq!(meta.min_deposit, 1);\n}\n\n// ---------------------------------------------------------------------------\n// max_deduct validation\n// ---------------------------------------------------------------------------\n\n#[test]\nfn init_max_deduct_zero_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    let result = client.try_init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026Some(0));\n    assert!(result.is_err());\n}\n\n#[test]\nfn init_min_deposit_exceeds_max_deduct_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    let result = client.try_init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026Some(100), \u0026None, \u0026Some(50));\n    assert!(result.is_err());\n}\n\n#[test]\nfn init_min_equals_max_deduct_succeeds() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    let meta = client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026Some(50), \u0026None, \u0026Some(50));\n    assert_eq!(meta.min_deposit, 50);\n    assert_eq!(client.get_max_deduct(), 50);\n}\n\n// ---------------------------------------------------------------------------\n// revenue_pool validation\n// ---------------------------------------------------------------------------\n\n#[test]\nfn init_revenue_pool_is_vault_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (vault_addr, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    let result = client.try_init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026Some(vault_addr), \u0026None);\n    assert!(result.is_err());\n}\n\n#[test]\nfn init_with_valid_revenue_pool_stores_it() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let pool = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    client.init(\n        \u0026owner,\n        \u0026usdc,\n        \u0026None,\n        \u0026None,\n        \u0026None,\n        \u0026Some(pool.clone()),\n        \u0026None,\n    );\n    assert_eq!(client.get_revenue_pool(), Some(pool));\n}\n\n#[test]\nfn init_without_revenue_pool_stores_none() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n    assert_eq!(client.get_revenue_pool(), None);\n}\n\n// ---------------------------------------------------------------------------\n// authorized_caller validation\n// ---------------------------------------------------------------------------\n\n#[test]\nfn init_authorized_caller_is_vault_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (vault_addr, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    let result = client.try_init(\u0026owner, \u0026usdc, \u0026None, \u0026Some(vault_addr), \u0026None, \u0026None, \u0026None);\n    assert!(result.is_err());\n}\n\n// ---------------------------------------------------------------------------\n// initial_balance validation\n// ---------------------------------------------------------------------------\n\n#[test]\nfn init_initial_balance_exceeds_onchain_panics() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (vault_addr, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    usdc_admin.mint(\u0026vault_addr, \u002650);\n    let result = client.try_init(\u0026owner, \u0026usdc, \u0026Some(100), \u0026None, \u0026None, \u0026None, \u0026None);\n    assert!(result.is_err());\n}\n\n#[test]\nfn init_initial_balance_zero_no_onchain_check() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    // zero balance — no on-chain check needed\n    let meta = client.init(\u0026owner, \u0026usdc, \u0026Some(0), \u0026None, \u0026None, \u0026None, \u0026None);\n    assert_eq!(meta.balance, 0);\n}\n\n#[test]\nfn init_initial_balance_exact_onchain_succeeds() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (vault_addr, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    usdc_admin.mint(\u0026vault_addr, \u0026200);\n    let meta = client.init(\u0026owner, \u0026usdc, \u0026Some(200), \u0026None, \u0026None, \u0026None, \u0026None);\n    assert_eq!(meta.balance, 200);\n}\n\n// ---------------------------------------------------------------------------\n// Post-init state correctness\n// ---------------------------------------------------------------------------\n\n#[test]\nfn init_sets_admin_to_owner() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n    assert_eq!(client.get_admin(), owner);\n}\n\n#[test]\nfn init_emits_event_with_balance() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (vault_addr, client) = create_vault(\u0026env);\n    let (usdc, _, usdc_admin) = create_usdc(\u0026env, \u0026owner);\n\n    usdc_admin.mint(\u0026vault_addr, \u0026500);\n    client.init(\u0026owner, \u0026usdc, \u0026Some(500), \u0026None, \u0026None, \u0026None, \u0026None);\n\n    use soroban_sdk::testutils::Events as _;\n    use soroban_sdk::IntoVal;\n    let events = env.events().all();\n    let ev = events\n        .iter()\n        .find(|e| {\n            e.0 == vault_addr \u0026\u0026 !e.1.is_empty() \u0026\u0026 {\n                let t: Symbol = e.1.get(0).unwrap().into_val(\u0026env);\n                t == Symbol::new(\u0026env, \"init\")\n            }\n        })\n        .expect(\"init event not found\");\n\n    let data: i128 = ev.2.into_val(\u0026env);\n    assert_eq!(data, 500);\n}\n\n#[test]\nfn init_default_min_deposit_is_one() {\n    let env = Env::default();\n    env.mock_all_auths();\n    let owner = Address::generate(\u0026env);\n    let (_, client) = create_vault(\u0026env);\n    let (usdc, _, _) = create_usdc(\u0026env, \u0026owner);\n\n    let meta = client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n    assert_eq!(meta.min_deposit, DEFAULT_MIN_DEPOSIT);\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","macbook","stellar","Callora-Contracts","contracts","vault","src","test_reentrancy.rs"],"content":"extern crate std;\n\nuse crate::{CalloraVault, CalloraVaultClient, DeductItem};\nuse soroban_sdk::testutils::{Address as _, Events as _};\nuse soroban_sdk::{contract, contractimpl, Address, Env, IntoVal, Symbol, Vec};\n\n// ---------------------------------------------------------------------------\n// Malicious Token Mock\n// ---------------------------------------------------------------------------\n\n#[contract]\npub struct MaliciousToken;\n\n#[contractimpl]\nimpl MaliciousToken {\n    pub fn transfer(env: Env, from: Address, _to: Address, _amount: i128) {\n        from.require_auth();\n\n        let vault_addr: Option\u003cAddress\u003e = env\n            .storage()\n            .instance()\n            .get(\u0026Symbol::new(\u0026env, \"vault_addr\"));\n        let attack_active: bool = env\n            .storage()\n            .instance()\n            .get(\u0026Symbol::new(\u0026env, \"attack_active\"))\n            .unwrap_or(false);\n\n        if attack_active {\n            if let Some(vault) = vault_addr {\n                // Prevent infinite recursion in the mock\n                env.storage()\n                    .instance()\n                    .set(\u0026Symbol::new(\u0026env, \"attack_active\"), \u0026false);\n\n                let caller: Address = env\n                    .storage()\n                    .instance()\n                    .get(\u0026Symbol::new(\u0026env, \"attack_caller\"))\n                    .unwrap();\n                let client = CalloraVaultClient::new(\u0026env, \u0026vault);\n\n                // Attempt re-entry into deduct\n                let _ = client.try_deduct(\u0026caller, \u00261, \u0026Some(Symbol::new(\u0026env, \"reentry_token\")));\n            }\n        }\n    }\n\n    pub fn balance(_env: Env, _id: Address) -\u003e i128 {\n        1_000_000_000\n    }\n\n    pub fn set_token_attack_config(env: Env, vault: Address, caller: Address, active: bool) {\n        env.storage()\n            .instance()\n            .set(\u0026Symbol::new(\u0026env, \"vault_addr\"), \u0026vault);\n        env.storage()\n            .instance()\n            .set(\u0026Symbol::new(\u0026env, \"attack_caller\"), \u0026caller);\n        env.storage()\n            .instance()\n            .set(\u0026Symbol::new(\u0026env, \"attack_active\"), \u0026active);\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Malicious Settlement Mock\n// ---------------------------------------------------------------------------\n\n#[contract]\npub struct MaliciousSettlement;\n\n#[contractimpl]\nimpl MaliciousSettlement {\n    pub fn receive_payment(\n        env: Env,\n        _caller: Address,\n        _amount: i128,\n        _to_pool: bool,\n        _developer: Option\u003cAddress\u003e,\n    ) {\n        let vault_addr: Option\u003cAddress\u003e = env\n            .storage()\n            .instance()\n            .get(\u0026Symbol::new(\u0026env, \"vault_addr\"));\n        let attack_active: bool = env\n            .storage()\n            .instance()\n            .get(\u0026Symbol::new(\u0026env, \"attack_active\"))\n            .unwrap_or(false);\n\n        if attack_active {\n            if let Some(vault) = vault_addr {\n                env.storage()\n                    .instance()\n                    .set(\u0026Symbol::new(\u0026env, \"attack_active\"), \u0026false);\n                let caller: Address = env\n                    .storage()\n                    .instance()\n                    .get(\u0026Symbol::new(\u0026env, \"attack_caller\"))\n                    .unwrap();\n                let client = CalloraVaultClient::new(\u0026env, \u0026vault);\n\n                // Attempt re-entry into deduct\n                let _ = client.try_deduct(\u0026caller, \u00261, \u0026Some(Symbol::new(\u0026env, \"reentry_settle\")));\n            }\n        }\n    }\n\n    pub fn set_settle_attack_config(env: Env, vault: Address, caller: Address, active: bool) {\n        env.storage()\n            .instance()\n            .set(\u0026Symbol::new(\u0026env, \"vault_addr\"), \u0026vault);\n        env.storage()\n            .instance()\n            .set(\u0026Symbol::new(\u0026env, \"attack_caller\"), \u0026caller);\n        env.storage()\n            .instance()\n            .set(\u0026Symbol::new(\u0026env, \"attack_active\"), \u0026active);\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Reentrancy Tests\n// ---------------------------------------------------------------------------\n\nfn setup_reentrancy_test(env: \u0026Env) -\u003e (Address, CalloraVaultClient, Address, Address, Address) {\n    let owner = Address::generate(env);\n    let vault_addr = env.register(CalloraVault, ());\n    let vault_client = CalloraVaultClient::new(env, \u0026vault_addr);\n\n    let token_addr = env.register(MaliciousToken, ());\n    let settlement_addr = env.register(MaliciousSettlement, ());\n\n    env.mock_all_auths();\n\n    // Init vault with the malicious token\n    vault_client.init(\u0026owner, \u0026token_addr, \u0026Some(1000), \u0026None, \u0026None, \u0026None, \u0026None);\n    vault_client.set_settlement(\u0026owner, \u0026settlement_addr);\n\n    (vault_addr, vault_client, token_addr, settlement_addr, owner)\n}\n\n#[test]\nfn test_reentrancy_via_token_transfer_is_blocked_by_auth() {\n    let env = Env::default();\n    let (vault_addr, vault_client, token_addr, _settlement_addr, owner) =\n        setup_reentrancy_test(\u0026env);\n\n    let token_mock = MaliciousTokenClient::new(\u0026env, \u0026token_addr);\n    token_mock.set_token_attack_config(\u0026vault_addr, \u0026owner, \u0026true);\n\n    let initial_balance = vault_client.balance();\n    assert_eq!(initial_balance, 1000);\n\n    // Trigger deduct -\u003e calls token.transfer -\u003e calls vault.deduct (re-entry)\n    let result = vault_client.try_deduct(\u0026owner, \u0026100, \u0026Some(Symbol::new(\u0026env, \"first_call\")));\n\n    assert!(result.is_ok(), \"First deduct should succeed\");\n    assert_eq!(\n        vault_client.balance(),\n        900,\n        \"Balance should only be deducted once\"\n    );\n\n    // Check if the re-entry event was published (it shouldn't be if it failed)\n    let events = env.events().all();\n    let mut reentry_count = 0;\n    for e in events.iter() {\n        if e.0 != vault_addr {\n            continue;\n        }\n        let topics = \u0026e.1;\n        if topics.len() \u003c 3 {\n            continue;\n        }\n        let rid: Symbol = topics.get(2).unwrap().into_val(\u0026env);\n        if rid == Symbol::new(\u0026env, \"reentry_token\") {\n            reentry_count += 1;\n        }\n    }\n\n    assert_eq!(reentry_count, 0, \"Re-entry should not have succeeded\");\n}\n\n#[test]\nfn test_reentrancy_via_settlement_callback_is_blocked() {\n    let env = Env::default();\n    let (vault_addr, vault_client, _token_addr, settlement_addr, owner) =\n        setup_reentrancy_test(\u0026env);\n\n    let settlement_mock = MaliciousSettlementClient::new(\u0026env, \u0026settlement_addr);\n    settlement_mock.set_settle_attack_config(\u0026vault_addr, \u0026owner, \u0026true);\n\n    let initial_balance = vault_client.balance();\n    assert_eq!(initial_balance, 1000);\n\n    // Trigger deduct -\u003e calls settlement.receive_payment -\u003e calls vault.deduct (re-entry)\n    let result = vault_client.try_deduct(\u0026owner, \u0026100, \u0026Some(Symbol::new(\u0026env, \"first_call\")));\n\n    assert!(result.is_ok(), \"First deduct should succeed\");\n    assert_eq!(\n        vault_client.balance(),\n        900,\n        \"Balance should only be deducted once\"\n    );\n\n    let events = env.events().all();\n    let mut reentry_count = 0;\n    for e in events.iter() {\n        if e.0 != vault_addr {\n            continue;\n        }\n        let topics = \u0026e.1;\n        if topics.len() \u003c 3 {\n            continue;\n        }\n        let rid: Symbol = topics.get(2).unwrap().into_val(\u0026env);\n        if rid == Symbol::new(\u0026env, \"reentry_settle\") {\n            reentry_count += 1;\n        }\n    }\n\n    assert_eq!(\n        reentry_count, 0,\n        \"Re-entry via settlement should not have succeeded\"\n    );\n}\n\n#[test]\nfn test_batch_deduct_reentrancy_via_token() {\n    let env = Env::default();\n    let (vault_addr, vault_client, token_addr, _settlement_addr, owner) =\n        setup_reentrancy_test(\u0026env);\n\n    let token_mock = MaliciousTokenClient::new(\u0026env, \u0026token_addr);\n    token_mock.set_token_attack_config(\u0026vault_addr, \u0026owner, \u0026true);\n\n    let items = Vec::from_array(\n        \u0026env,\n        [\n            DeductItem {\n                amount: 50,\n                request_id: Some(Symbol::new(\u0026env, \"item1\")),\n            },\n            DeductItem {\n                amount: 50,\n                request_id: Some(Symbol::new(\u0026env, \"item2\")),\n            },\n        ],\n    );\n\n    let result = vault_client.try_batch_deduct(\u0026owner, \u0026items);\n\n    assert!(result.is_ok(), \"Batch deduct should succeed\");\n    assert_eq!(\n        vault_client.balance(),\n        900,\n        \"Balance should only be deducted by batch amount\"\n    );\n\n    let events = env.events().all();\n    let mut reentry_count = 0;\n    for e in events.iter() {\n        if e.0 != vault_addr {\n            continue;\n        }\n        let topics = \u0026e.1;\n        if topics.len() \u003c 3 {\n            continue;\n        }\n        let rid: Symbol = topics.get(2).unwrap().into_val(\u0026env);\n        if rid == Symbol::new(\u0026env, \"reentry_token\") {\n            reentry_count += 1;\n        }\n    }\n\n    assert_eq!(\n        reentry_count, 0,\n        \"Re-entry during batch should not have succeeded\"\n    );\n}\n\n#[test]\nfn test_reentrancy_by_authorized_attacker() {\n    let env = Env::default();\n    let (vault_addr, vault_client, token_addr, _settlement_addr, _owner) =\n        setup_reentrancy_test(\u0026env);\n\n    let attacker = Address::generate(\u0026env);\n    vault_client.set_authorized_caller(\u0026Some(attacker.clone()));\n\n    let token_mock = MaliciousTokenClient::new(\u0026env, \u0026token_addr);\n    token_mock.set_token_attack_config(\u0026vault_addr, \u0026attacker, \u0026true);\n\n    let initial_balance = vault_client.balance();\n    assert_eq!(initial_balance, 1000);\n\n    // Attacker calls deduct -\u003e token.transfer -\u003e attacker calls vault.deduct (re-entry)\n    let result = vault_client.try_deduct(\u0026attacker, \u0026100, \u0026Some(Symbol::new(\u0026env, \"first_call\")));\n\n    assert!(result.is_ok(), \"First deduct should succeed\");\n    assert_eq!(\n        vault_client.balance(),\n        900,\n        \"Balance should only be deducted once\"\n    );\n\n    let events = env.events().all();\n    let mut reentry_count = 0;\n    for e in events.iter() {\n        if e.0 != vault_addr {\n            continue;\n        }\n        let topics = \u0026e.1;\n        if topics.len() \u003c 3 {\n            continue;\n        }\n        let rid: Symbol = topics.get(2).unwrap().into_val(\u0026env);\n        if rid == Symbol::new(\u0026env, \"reentry_token\") {\n            reentry_count += 1;\n        }\n    }\n\n    assert_eq!(\n        reentry_count, 0,\n        \"Re-entry by authorized attacker should still fail or be blocked\"\n    );\n}\n\n#[test]\nfn test_withdraw_reentrancy_via_token() {\n    let env = Env::default();\n    let (vault_addr, vault_client, token_addr, _settlement_addr, owner) =\n        setup_reentrancy_test(\u0026env);\n\n    let token_mock = MaliciousTokenClient::new(\u0026env, \u0026token_addr);\n    // Withdraw calls token.transfer. We attempt to call deduct() during withdraw's transfer.\n    token_mock.set_token_attack_config(\u0026vault_addr, \u0026owner, \u0026true);\n\n    let result = vault_client.try_withdraw(\u0026100);\n\n    assert!(result.is_ok(), \"Withdraw should succeed\");\n    assert_eq!(\n        vault_client.balance(),\n        900,\n        \"Balance should only be deducted by withdraw amount\"\n    );\n\n    let events = env.events().all();\n    let mut reentry_count = 0;\n    for e in events.iter() {\n        if e.0 != vault_addr {\n            continue;\n        }\n        let topics = \u0026e.1;\n        if topics.len() \u003c 3 {\n            continue;\n        }\n        let rid: Symbol = topics.get(2).unwrap().into_val(\u0026env);\n        if rid == Symbol::new(\u0026env, \"reentry_token\") {\n            reentry_count += 1;\n        }\n    }\n\n    assert_eq!(\n        reentry_count, 0,\n        \"Re-entry during withdraw should not have succeeded\"\n    );\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","macbook","stellar","Callora-Contracts","contracts","vault","src","test_setter_validation.rs"],"content":"extern crate std;\nuse super::*;\nuse soroban_sdk::testutils::{Address as _, Events as _};\nuse soroban_sdk::{token, Address, Env, IntoVal, String, Symbol};\n\nfn create_usdc\u003c'a\u003e(env: \u0026'a Env, admin: \u0026'a Address) -\u003e (Address, token::StellarAssetClient\u003c'a\u003e) {\n    let ca = env.register_stellar_asset_contract_v2(admin.clone());\n    let addr = ca.address();\n    (addr.clone(), token::StellarAssetClient::new(env, \u0026addr))\n}\n\nfn create_vault(env: \u0026Env) -\u003e (Address, CalloraVaultClient) {\n    let addr = env.register(CalloraVault, ());\n    (addr.clone(), CalloraVaultClient::new(env, \u0026addr))\n}\n\nfn setup(env: \u0026Env) -\u003e (Address, CalloraVaultClient, Address, Address) {\n    env.mock_all_auths();\n    let admin = Address::generate(env);\n    let (vault_addr, client) = create_vault(env);\n    let (usdc, _) = create_usdc(env, \u0026admin);\n    client.init(\u0026admin, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n    (vault_addr, client, usdc, admin)\n}\n\n#[test]\nfn set_price_offering_id_too_long() {\n    let env = Env::default();\n    let (_, client, _, admin) = setup(\u0026env);\n    let long_id = \"a\".repeat((MAX_OFFERING_ID_LEN + 1) as usize);\n    let result = client.try_set_price(\n        \u0026admin,\n        \u0026String::from_str(\u0026env, \u0026long_id),\n        \u0026String::from_str(\u0026env, \"100\"),\n    );\n    assert!(result.is_err());\n}\n\n#[test]\nfn set_price_zero_price() {\n    let env = Env::default();\n    let (_, client, _, admin) = setup(\u0026env);\n    let result = client.try_set_price(\n        \u0026admin,\n        \u0026String::from_str(\u0026env, \"off1\"),\n        \u0026String::from_str(\u0026env, \"0\"),\n    );\n    assert!(result.is_err());\n}\n\n#[test]\nfn set_price_successful() {\n    let env = Env::default();\n    let (_, client, _, admin) = setup(\u0026env);\n    client.set_price(\n        \u0026admin,\n        \u0026String::from_str(\u0026env, \"off1\"),\n        \u0026String::from_str(\u0026env, \"1000\"),\n    );\n    // Verify readback\n    let stored = client.get_price(\u0026String::from_str(\u0026env, \"off1\"));\n    assert_eq!(stored, Some(String::from_str(\u0026env, \"1000\")));\n}\n\n#[test]\nfn set_settlement_vault_address_fails() {\n    let env = Env::default();\n    let (vault_addr, client, _, admin) = setup(\u0026env);\n    let result = client.try_set_settlement(\u0026admin, \u0026vault_addr);\n    assert!(result.is_err());\n}\n\n#[test]\nfn set_settlement_usdc_address_fails() {\n    let env = Env::default();\n    let (_, client, usdc, admin) = setup(\u0026env);\n    let result = client.try_set_settlement(\u0026admin, \u0026usdc);\n    assert!(result.is_err());\n}\n\n#[test]\nfn set_settlement_equals_revenue_pool_fails() {\n    let env = Env::default();\n    let (_, client, _, admin) = setup(\u0026env);\n    let pool = Address::generate(\u0026env);\n    client.set_revenue_pool(\u0026admin, \u0026Some(pool.clone()));\n    let result = client.try_set_settlement(\u0026admin, \u0026pool);\n    assert!(result.is_err());\n}\n\n#[test]\nfn set_settlement_valid_address_succeeds() {\n    let env = Env::default();\n    let (_, client, _, admin) = setup(\u0026env);\n    let s = Address::generate(\u0026env);\n    client.set_settlement(\u0026admin, \u0026s);\n    assert_eq!(client.get_settlement(), s);\n}\n\n#[test]\nfn set_revenue_pool_vault_address_fails() {\n    let env = Env::default();\n    let (vault_addr, client, _, admin) = setup(\u0026env);\n    let result = client.try_set_revenue_pool(\u0026admin, \u0026Some(vault_addr));\n    assert!(result.is_err());\n}\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","macbook","stellar","Callora-Contracts","contracts","vault","src","test_settler_validation.rs"],"content":"// Settlement/revenue pool address validation tests.\n// These validations are covered in the existing deduct,\n// set_settlement, and set_revenue_pool tests in test.rs.\n","traces":[],"covered":0,"coverable":0},{"path":["/","Users","macbook","stellar","Callora-Contracts","contracts","vault","src","test_views.rs"],"content":"extern crate std;\n\nuse soroban_sdk::testutils::Address as _;\nuse soroban_sdk::{token, Address, Env, String};\n\nuse super::*;\n\n// ---------------------------------------------------------------------------\n// Helpers\n// ---------------------------------------------------------------------------\n\nfn create_usdc\u003c'a\u003e(env: \u0026'a Env, admin: \u0026Address) -\u003e (Address, token::StellarAssetClient\u003c'a\u003e) {\n    let ca = env.register_stellar_asset_contract_v2(admin.clone());\n    let addr = ca.address();\n    (addr.clone(), token::StellarAssetClient::new(env, \u0026addr))\n}\n\nfn setup(env: \u0026Env) -\u003e (Address, CalloraVaultClient\u003c'_\u003e, Address) {\n    let owner = Address::generate(env);\n    let vault_addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(env, \u0026vault_addr);\n    let (usdc, _) = create_usdc(env, \u0026owner);\n    env.mock_all_auths();\n    client.init(\u0026owner, \u0026usdc, \u0026None, \u0026None, \u0026None, \u0026None, \u0026None);\n    (owner, client, usdc)\n}\n\n// ---------------------------------------------------------------------------\n// get_meta\n// ---------------------------------------------------------------------------\n\n#[test]\nfn get_meta_before_init_panics() {\n    let env = Env::default();\n    let vault_addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026vault_addr);\n    assert!(client.try_get_meta().is_err());\n}\n\n#[test]\nfn get_meta_returns_correct_fields() {\n    let env = Env::default();\n    let (owner, client, _) = setup(\u0026env);\n    let meta = client.get_meta();\n    assert_eq!(meta.owner, owner);\n    assert_eq!(meta.balance, 0);\n    assert_eq!(meta.min_deposit, DEFAULT_MIN_DEPOSIT);\n    assert!(meta.authorized_caller.is_none());\n}\n\n// ---------------------------------------------------------------------------\n// balance\n// ---------------------------------------------------------------------------\n\n#[test]\nfn balance_before_init_panics() {\n    let env = Env::default();\n    let vault_addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026vault_addr);\n    assert!(client.try_balance().is_err());\n}\n\n#[test]\nfn balance_returns_zero_after_init() {\n    let env = Env::default();\n    let (_, client, _) = setup(\u0026env);\n    assert_eq!(client.balance(), 0);\n}\n\n// ---------------------------------------------------------------------------\n// get_admin\n// ---------------------------------------------------------------------------\n\n#[test]\nfn get_admin_before_init_panics() {\n    let env = Env::default();\n    let vault_addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026vault_addr);\n    assert!(client.try_get_admin().is_err());\n}\n\n#[test]\nfn get_admin_returns_owner_after_init() {\n    let env = Env::default();\n    let (owner, client, _) = setup(\u0026env);\n    assert_eq!(client.get_admin(), owner);\n}\n\n// ---------------------------------------------------------------------------\n// get_usdc_token\n// ---------------------------------------------------------------------------\n\n#[test]\nfn get_usdc_token_before_init_panics() {\n    let env = Env::default();\n    let vault_addr = env.register(CalloraVault, ());\n    let client = CalloraVaultClient::new(\u0026env, \u0026vault_addr);\n    assert!(client.try_get_usdc_token().is_err());\n}\n\n#[test]\nfn get_usdc_token_returns_address_after_init() {\n    let env = Env::default();\n    let (_, client, usdc) = setup(\u0026env);\n    assert_eq!(client.get_usdc_token(), usdc);\n}\n\n// ---------------------------------------------------------------------------\n// get_max_de
